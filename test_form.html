<!DOCTYPE html>
<html>
<body>
<form action="http://localhost:5000/calculate" method="POST">
    <input name="miner-model" value="Antminer S19 Pro">
    <input name="hashrate" value="110">
    <input name="power-consumption" value="3250">
    <input name="miner-count" value="1230">
    <input name="total-hashrate" value="135300">
    <input name="total-power" value="3997500">
    <input name="electricity-cost" value="0.06">
    <input name="btc-price-input" value="115091">
    <input name="use-real-time" value="on">
    <button type="submit">Test Submit</button>
</form>
<script>
document.querySelector('form').addEventListener('submit', function(e) {
    e.preventDefault();
    var formData = new FormData(this);
    var data = {};
    for(var pair of formData.entries()) {
        data[pair[0]] = pair[1];
    }
    fetch('http://localhost:5000/calculate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    })
    .then(r => r.json())
    .then(d => {
        document.body.innerHTML += '<pre>Result: ' + JSON.stringify(d, null, 2) + '</pre>';
    })
    .catch(e => {
        document.body.innerHTML += '<pre>Error: ' + e + '</pre>';
    });
});
// Auto-submit for testing
setTimeout(() => document.querySelector('button').click(), 100);
</script>
</body>
</html>
