<!DOCTYPE html>
<html lang="zh" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能电力削减管理系统</title>
    <link href="https://cdn.replit.com/agent/bootstrap-agent-dark-theme.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <style>
        .card {
            margin-bottom: 1.5rem;
            border: none;
            box-shadow: 0 .125rem .25rem rgba(0,0,0,.075);
        }
        .category-card {
            text-align: center;
            border-radius: 0.5rem;
            transition: all 0.3s;
        }
        .category-card:hover {
            transform: translateY(-5px);
        }
        .category-card .count {
            font-size: 2rem;
            font-weight: bold;
        }
        .category-card .health {
            font-size: 1.2rem;
        }
        .grade-a {
            border-left: 5px solid #198754;
        }
        .grade-b {
            border-left: 5px solid #0d6efd;
        }
        .grade-c {
            border-left: 5px solid #fd7e14;
        }
        .grade-d {
            border-left: 5px solid #dc3545;
        }
        .stat-card {
            text-align: center;
            height: 100%;
        }
        .stat-card .value {
            font-size: 2.5rem;
            font-weight: bold;
        }
        .stat-card .label {
            font-size: 1rem;
            opacity: 0.8;
        }
        #miners-table {
            font-size: 0.9rem;
        }
        .health-indicator {
            width: 50px;
            height: 10px;
            border-radius: 5px;
            background: linear-gradient(to right, #dc3545, #fd7e14, #0d6efd, #198754);
            position: relative;
            margin-right: 10px;
        }
        .health-indicator::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: white;
            border: 1px solid #555;
            top: 0;
            transform: translateX(-50%);
        }
        .efficiency-value {
            font-family: monospace;
            font-weight: bold;
        }
        .loader {
            border: 5px solid #f3f3f3;
            border-radius: 50%;
            border-top: 5px solid #3498db;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status-badge {
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .status-running {
            background-color: rgba(25, 135, 84, 0.2);
            color: #198754;
        }
        .status-shutdown {
            background-color: rgba(220, 53, 69, 0.2);
            color: #dc3545;
        }
        .progress-slim {
            height: 0.5rem;
        }
        #power-reduction-value {
            font-size: 1.5rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-lightning-charge-fill me-2"></i>
                智能电力削减管理系统
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" href="/">仪表盘</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid my-4">
        <div class="row">
            <!-- 左侧控制面板 -->
            <div class="col-lg-3">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title mb-0">
                            <i class="bi bi-sliders me-2"></i>
                            电力控制
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-4">
                            <label for="power-reduction-range" class="form-label">电力削减目标</label>
                            <div class="d-flex align-items-center mb-2">
                                <input type="range" class="form-range flex-grow-1 me-2" id="power-reduction-range" min="0" max="50" value="20" step="5">
                                <span id="power-reduction-value">20%</span>
                            </div>
                            <div class="progress progress-slim mb-2">
                                <div class="progress-bar bg-success" role="progressbar" style="width: 20%" id="power-reduction-progress"></div>
                            </div>
                            <small class="text-muted">调整滑块设置电力削减百分比</small>
                        </div>
                        <button id="apply-reduction-btn" class="btn btn-primary w-100 mb-3">
                            <i class="bi bi-lightning-charge me-2"></i>
                            应用电力削减策略
                        </button>
                        <button id="generate-rotation-btn" class="btn btn-outline-secondary w-100 mb-3">
                            <i class="bi bi-arrow-repeat me-2"></i>
                            生成矿机轮换计划
                        </button>
                        <button id="execute-rotation-btn" class="btn btn-outline-success w-100 mb-3" disabled>
                            <i class="bi bi-play-fill me-2"></i>
                            执行轮换计划
                        </button>
                        <hr>
                        <div class="mb-3">
                            <label for="miners-count" class="form-label">矿机数量</label>
                            <div class="input-group">
                                <input type="number" class="form-control" id="miners-count" value="1000" min="10" max="10000">
                                <button class="btn btn-outline-secondary" type="button" id="initialize-miners-btn">
                                    <i class="bi bi-arrow-clockwise me-1"></i>
                                    重新初始化
                                </button>
                            </div>
                            <small class="text-muted">注意：重新初始化会重置所有矿机数据</small>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title mb-0">
                            <i class="bi bi-funnel me-2"></i>
                            筛选矿机
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">按状态筛选</label>
                            <div class="d-flex">
                                <div class="form-check me-3">
                                    <input class="form-check-input status-filter" type="radio" name="statusFilter" id="status-all" value="all" checked>
                                    <label class="form-check-label" for="status-all">全部</label>
                                </div>
                                <div class="form-check me-3">
                                    <input class="form-check-input status-filter" type="radio" name="statusFilter" id="status-running" value="running">
                                    <label class="form-check-label" for="status-running">运行中</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input status-filter" type="radio" name="statusFilter" id="status-shutdown" value="shutdown">
                                    <label class="form-check-label" for="status-shutdown">已关停</label>
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">按类别筛选</label>
                            <div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input category-filter" type="radio" name="categoryFilter" id="category-all" value="all" checked>
                                    <label class="form-check-label" for="category-all">全部</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input category-filter" type="radio" name="categoryFilter" id="category-a" value="A">
                                    <label class="form-check-label" for="category-a">A级</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input category-filter" type="radio" name="categoryFilter" id="category-b" value="B">
                                    <label class="form-check-label" for="category-b">B级</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input category-filter" type="radio" name="categoryFilter" id="category-c" value="C">
                                    <label class="form-check-label" for="category-c">C级</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input category-filter" type="radio" name="categoryFilter" id="category-d" value="D">
                                    <label class="form-check-label" for="category-d">D级</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 右侧主内容区 -->
            <div class="col-lg-9">
                <!-- 系统状态卡片 -->
                <div class="row mb-4">
                    <div class="col-md-3">
                        <div class="card stat-card">
                            <div class="card-body">
                                <div class="value" id="total-miners">--</div>
                                <div class="label">总矿机数</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card">
                            <div class="card-body">
                                <div class="value" id="running-miners">--</div>
                                <div class="label">运行中矿机</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card">
                            <div class="card-body">
                                <div class="value" id="total-hashrate">--</div>
                                <div class="label">总算力 (PH/s)</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card">
                            <div class="card-body">
                                <div class="value" id="effective-reduction">--</div>
                                <div class="label">实际电力削减</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 矿机健康状态卡片 -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h5 class="card-title mb-0">
                            <i class="bi bi-activity me-2"></i>
                            矿机健康状态
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-lg-3 col-md-6">
                                <div class="card category-card grade-a">
                                    <div class="card-body">
                                        <h5>A级矿机</h5>
                                        <div class="count mb-2" id="category-a-count">--</div>
                                        <div class="d-flex justify-content-between">
                                            <span class="badge bg-success" id="category-a-running">--</span>
                                            <span class="badge bg-danger" id="category-a-shutdown">--</span>
                                        </div>
                                        <div class="health mt-2" id="category-a-health">--</div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-lg-3 col-md-6">
                                <div class="card category-card grade-b">
                                    <div class="card-body">
                                        <h5>B级矿机</h5>
                                        <div class="count mb-2" id="category-b-count">--</div>
                                        <div class="d-flex justify-content-between">
                                            <span class="badge bg-success" id="category-b-running">--</span>
                                            <span class="badge bg-danger" id="category-b-shutdown">--</span>
                                        </div>
                                        <div class="health mt-2" id="category-b-health">--</div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-lg-3 col-md-6">
                                <div class="card category-card grade-c">
                                    <div class="card-body">
                                        <h5>C级矿机</h5>
                                        <div class="count mb-2" id="category-c-count">--</div>
                                        <div class="d-flex justify-content-between">
                                            <span class="badge bg-success" id="category-c-running">--</span>
                                            <span class="badge bg-danger" id="category-c-shutdown">--</span>
                                        </div>
                                        <div class="health mt-2" id="category-c-health">--</div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-lg-3 col-md-6">
                                <div class="card category-card grade-d">
                                    <div class="card-body">
                                        <h5>D级矿机</h5>
                                        <div class="count mb-2" id="category-d-count">--</div>
                                        <div class="d-flex justify-content-between">
                                            <span class="badge bg-success" id="category-d-running">--</span>
                                            <span class="badge bg-danger" id="category-d-shutdown">--</span>
                                        </div>
                                        <div class="health mt-2" id="category-d-health">--</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 轮换计划卡片 -->
                <div class="card mb-4" id="rotation-plan-card" style="display: none;">
                    <div class="card-header">
                        <h5 class="card-title mb-0">
                            <i class="bi bi-arrow-repeat me-2"></i>
                            矿机轮换计划
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <div class="card bg-light">
                                    <div class="card-body">
                                        <h6>下次轮换日期</h6>
                                        <div class="fs-5" id="next-rotation-date">--</div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="card bg-light">
                                    <div class="card-body">
                                        <h6>轮换间隔</h6>
                                        <div class="fs-5" id="rotation-interval">-- 天</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="card bg-light">
                                    <div class="card-body">
                                        <h6>计划关停矿机</h6>
                                        <div class="fs-5" id="miners-to-shutdown">-- 台</div>
                                        <div class="small text-muted" id="miners-to-shutdown-detail"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="card bg-light">
                                    <div class="card-body">
                                        <h6>计划启动矿机</h6>
                                        <div class="fs-5" id="miners-to-start">-- 台</div>
                                        <div class="small text-muted" id="miners-to-start-detail"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 矿机列表表格 -->
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="card-title mb-0">
                            <i class="bi bi-pc-display me-2"></i>
                            矿机列表
                        </h5>
                        <span class="badge bg-secondary" id="miners-count-display">已加载 0 台矿机</span>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover" id="miners-table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>类别</th>
                                        <th>状态</th>
                                        <th>算力 (TH/s)</th>
                                        <th>功耗 (W)</th>
                                        <th>温度</th>
                                        <th>错误率</th>
                                        <th>健康分数</th>
                                        <th>效率</th>
                                    </tr>
                                </thead>
                                <tbody id="miners-table-body">
                                    <tr>
                                        <td colspan="9" class="text-center">
                                            <div class="loader"></div>
                                            <div>加载矿机数据...</div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 提示框 -->
    <div class="position-fixed top-0 end-0 p-3" style="z-index: 11">
        <div id="toast-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 全局变量
        let systemStatus = {};
        let minersHealth = {};
        let minersList = [];
        let rotationPlan = null;
        
        // DOM加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化事件监听
            initEventListeners();
            
            // 加载初始数据
            loadSystemStatus();
            loadMinersHealth();
            loadMinersList();
            
            // 每10秒刷新一次数据
            setInterval(function() {
                loadSystemStatus();
                loadMinersHealth();
            }, 10000);
        });
        
        // 初始化事件监听
        function initEventListeners() {
            // 电力削减目标滑块
            const reductionRange = document.getElementById('power-reduction-range');
            const reductionValue = document.getElementById('power-reduction-value');
            const reductionProgress = document.getElementById('power-reduction-progress');
            
            reductionRange.addEventListener('input', function() {
                const value = this.value;
                reductionValue.textContent = value + '%';
                reductionProgress.style.width = value + '%';
            });
            
            // 应用电力削减按钮
            document.getElementById('apply-reduction-btn').addEventListener('click', function() {
                const percentage = document.getElementById('power-reduction-range').value;
                applyPowerReduction(percentage);
            });
            
            // 生成轮换计划按钮
            document.getElementById('generate-rotation-btn').addEventListener('click', function() {
                generateRotationPlan();
            });
            
            // 执行轮换计划按钮
            document.getElementById('execute-rotation-btn').addEventListener('click', function() {
                executeRotationPlan();
            });
            
            // 初始化矿机按钮
            document.getElementById('initialize-miners-btn').addEventListener('click', function() {
                const count = document.getElementById('miners-count').value;
                initializeMiners(count);
            });
            
            // 筛选器
            document.querySelectorAll('.status-filter, .category-filter').forEach(filter => {
                filter.addEventListener('change', function() {
                    loadMinersList();
                });
            });
        }
        
        // 加载系统状态
        function loadSystemStatus() {
            fetch('/api/system-status')
                .then(response => response.json())
                .then(data => {
                    systemStatus = data;
                    updateSystemStatusUI(data);
                })
                .catch(error => {
                    console.error('加载系统状态出错:', error);
                    showToast('加载系统状态出错', 'danger');
                });
        }
        
        // 更新系统状态UI
        function updateSystemStatusUI(data) {
            document.getElementById('total-miners').textContent = data.total_miners;
            document.getElementById('running-miners').textContent = data.running_miners;
            document.getElementById('total-hashrate').textContent = (data.total_hashrate / 1000).toFixed(2);
            document.getElementById('effective-reduction').textContent = data.effective_power_reduction + '%';
            
            // 设置电力削减滑块的值
            const reductionRange = document.getElementById('power-reduction-range');
            reductionRange.value = data.power_reduction_percentage;
            document.getElementById('power-reduction-value').textContent = data.power_reduction_percentage + '%';
            document.getElementById('power-reduction-progress').style.width = data.power_reduction_percentage + '%';
        }
        
        // 加载矿机健康状况
        function loadMinersHealth() {
            fetch('/api/miners-health')
                .then(response => response.json())
                .then(data => {
                    minersHealth = data;
                    updateMinersHealthUI(data);
                })
                .catch(error => {
                    console.error('加载矿机健康状况出错:', error);
                    showToast('加载矿机健康状况出错', 'danger');
                });
        }
        
        // 更新矿机健康状况UI
        function updateMinersHealthUI(data) {
            const categories = ['A', 'B', 'C', 'D'];
            
            categories.forEach(category => {
                const categoryData = data.categories[category];
                
                document.getElementById(`category-${category.toLowerCase()}-count`).textContent = categoryData.total;
                document.getElementById(`category-${category.toLowerCase()}-running`).textContent = `运行: ${categoryData.running}`;
                document.getElementById(`category-${category.toLowerCase()}-shutdown`).textContent = `关停: ${categoryData.shutdown}`;
                document.getElementById(`category-${category.toLowerCase()}-health`).textContent = 
                    `健康分: ${categoryData.avg_health.toFixed(1)} | 效率: ${categoryData.avg_efficiency.toFixed(6)}`;
            });
        }
        
        // 加载矿机列表
        function loadMinersList() {
            // 获取筛选条件
            const statusFilter = document.querySelector('input[name="statusFilter"]:checked').value;
            const categoryFilter = document.querySelector('input[name="categoryFilter"]:checked').value;
            
            // 构建URL
            let url = '/api/miners-list';
            const params = [];
            
            if (statusFilter !== 'all') {
                params.push(`status=${statusFilter}`);
            }
            
            if (categoryFilter !== 'all') {
                params.push(`category=${categoryFilter}`);
            }
            
            if (params.length > 0) {
                url += '?' + params.join('&');
            }
            
            // 显示加载中
            document.getElementById('miners-table-body').innerHTML = `
                <tr>
                    <td colspan="9" class="text-center">
                        <div class="loader"></div>
                        <div>加载矿机数据...</div>
                    </td>
                </tr>
            `;
            
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    minersList = data;
                    updateMinersListUI(data);
                })
                .catch(error => {
                    console.error('加载矿机列表出错:', error);
                    showToast('加载矿机列表出错', 'danger');
                    
                    // 显示错误
                    document.getElementById('miners-table-body').innerHTML = `
                        <tr>
                            <td colspan="9" class="text-center text-danger">
                                <i class="bi bi-exclamation-triangle me-2"></i>
                                加载矿机列表出错
                            </td>
                        </tr>
                    `;
                });
        }
        
        // 更新矿机列表UI
        function updateMinersListUI(data) {
            const tableBody = document.getElementById('miners-table-body');
            
            // 更新计数器
            document.getElementById('miners-count-display').textContent = `已加载 ${data.length} 台矿机`;
            
            // 如果没有数据，显示提示
            if (data.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="9" class="text-center">
                            <i class="bi bi-info-circle me-2"></i>
                            没有符合条件的矿机
                        </td>
                    </tr>
                `;
                return;
            }
            
            // 构建表格行
            let html = '';
            
            for (const miner of data) {
                // 设置健康分数指示器位置
                const healthPosition = (miner.health_score / 100) * 100 + '%';
                
                // 设置状态标签
                let statusBadge = '';
                if (miner.status === 'running') {
                    statusBadge = '<span class="status-badge status-running">运行中</span>';
                } else if (miner.status === 'shutdown') {
                    statusBadge = '<span class="status-badge status-shutdown">已关停</span>';
                } else {
                    statusBadge = '<span class="status-badge bg-secondary">未知</span>';
                }
                
                html += `
                    <tr class="miner-row" data-id="${miner.id}">
                        <td>${miner.id}</td>
                        <td class="text-center">
                            <span class="badge ${miner.category === 'A' ? 'bg-success' : 
                                               miner.category === 'B' ? 'bg-primary' : 
                                               miner.category === 'C' ? 'bg-warning' : 'bg-danger'}">${miner.category}</span>
                        </td>
                        <td>${statusBadge}</td>
                        <td>${miner.hashrate.toFixed(2)}</td>
                        <td>${miner.power.toFixed(2)}</td>
                        <td>${miner.temperature}°C</td>
                        <td>${miner.error_rate}%</td>
                        <td>
                            <div class="d-flex align-items-center">
                                <div class="health-indicator me-2">
                                    <div style="position: absolute; left: ${healthPosition}; top: 0; width: 10px; height: 10px; background-color: white; border-radius: 50%; transform: translateX(-50%);"></div>
                                </div>
                                <span>${miner.health_score}</span>
                            </div>
                        </td>
                        <td class="efficiency-value">${miner.efficiency.toFixed(6)}</td>
                    </tr>
                `;
            }
            
            tableBody.innerHTML = html;
        }
        
        // 应用电力削减策略
        function applyPowerReduction(percentage) {
            // 显示加载中状态
            document.getElementById('apply-reduction-btn').disabled = true;
            document.getElementById('apply-reduction-btn').innerHTML = `
                <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                应用中...
            `;
            
            fetch('/api/apply-reduction', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ percentage: percentage })
            })
            .then(response => response.json())
            .then(data => {
                // 恢复按钮状态
                document.getElementById('apply-reduction-btn').disabled = false;
                document.getElementById('apply-reduction-btn').innerHTML = `
                    <i class="bi bi-lightning-charge me-2"></i>
                    应用电力削减策略
                `;
                
                if (data.success) {
                    showToast(data.message, 'success');
                    
                    // 刷新数据
                    loadSystemStatus();
                    loadMinersHealth();
                    loadMinersList();
                } else {
                    showToast('应用电力削减策略失败', 'danger');
                }
            })
            .catch(error => {
                console.error('应用电力削减策略出错:', error);
                showToast('应用电力削减策略出错', 'danger');
                
                // 恢复按钮状态
                document.getElementById('apply-reduction-btn').disabled = false;
                document.getElementById('apply-reduction-btn').innerHTML = `
                    <i class="bi bi-lightning-charge me-2"></i>
                    应用电力削减策略
                `;
            });
        }
        
        // 生成轮换计划
        function generateRotationPlan() {
            // 显示加载中状态
            document.getElementById('generate-rotation-btn').disabled = true;
            document.getElementById('generate-rotation-btn').innerHTML = `
                <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                生成中...
            `;
            
            fetch('/api/generate-rotation')
                .then(response => response.json())
                .then(data => {
                    // 恢复按钮状态
                    document.getElementById('generate-rotation-btn').disabled = false;
                    document.getElementById('generate-rotation-btn').innerHTML = `
                        <i class="bi bi-arrow-repeat me-2"></i>
                        生成矿机轮换计划
                    `;
                    
                    rotationPlan = data;
                    updateRotationPlanUI(data);
                    
                    // 启用执行按钮
                    document.getElementById('execute-rotation-btn').disabled = false;
                    
                    showToast('轮换计划生成成功', 'success');
                })
                .catch(error => {
                    console.error('生成轮换计划出错:', error);
                    showToast('生成轮换计划出错', 'danger');
                    
                    // 恢复按钮状态
                    document.getElementById('generate-rotation-btn').disabled = false;
                    document.getElementById('generate-rotation-btn').innerHTML = `
                        <i class="bi bi-arrow-repeat me-2"></i>
                        生成矿机轮换计划
                    `;
                });
        }
        
        // 更新轮换计划UI
        function updateRotationPlanUI(data) {
            // 显示轮换计划卡片
            document.getElementById('rotation-plan-card').style.display = 'block';
            
            // 设置轮换计划数据
            document.getElementById('next-rotation-date').textContent = formatDate(data.next_rotation_date);
            document.getElementById('rotation-interval').textContent = data.days_between_rotation + ' 天';
            
            const shutdownMiners = data.next_rotation_plan.miners_to_shutdown || [];
            const startMiners = data.next_rotation_plan.miners_to_start || [];
            
            document.getElementById('miners-to-shutdown').textContent = shutdownMiners.length + ' 台';
            document.getElementById('miners-to-start').textContent = startMiners.length + ' 台';
            
            // 如果有矿机IDs，显示部分
            if (shutdownMiners.length > 0) {
                const shutdownDetail = shutdownMiners.slice(0, 5).join(', ') + 
                    (shutdownMiners.length > 5 ? '...' : '');
                document.getElementById('miners-to-shutdown-detail').textContent = shutdownDetail;
            } else {
                document.getElementById('miners-to-shutdown-detail').textContent = '无矿机需要关停';
            }
            
            if (startMiners.length > 0) {
                const startDetail = startMiners.slice(0, 5).join(', ') + 
                    (startMiners.length > 5 ? '...' : '');
                document.getElementById('miners-to-start-detail').textContent = startDetail;
            } else {
                document.getElementById('miners-to-start-detail').textContent = '无矿机需要启动';
            }
        }
        
        // 执行轮换计划
        function executeRotationPlan() {
            if (!rotationPlan) {
                showToast('请先生成轮换计划', 'warning');
                return;
            }
            
            // 显示加载中状态
            document.getElementById('execute-rotation-btn').disabled = true;
            document.getElementById('execute-rotation-btn').innerHTML = `
                <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                执行中...
            `;
            
            fetch('/api/execute-rotation', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                // 恢复按钮状态
                document.getElementById('execute-rotation-btn').disabled = true;
                document.getElementById('execute-rotation-btn').innerHTML = `
                    <i class="bi bi-play-fill me-2"></i>
                    执行轮换计划
                `;
                
                if (data.success) {
                    showToast(data.message, 'success');
                    
                    // 清除轮换计划
                    rotationPlan = null;
                    document.getElementById('rotation-plan-card').style.display = 'none';
                    
                    // 刷新数据
                    loadSystemStatus();
                    loadMinersHealth();
                    loadMinersList();
                } else {
                    showToast('执行轮换计划失败', 'danger');
                }
            })
            .catch(error => {
                console.error('执行轮换计划出错:', error);
                showToast('执行轮换计划出错', 'danger');
                
                // 恢复按钮状态
                document.getElementById('execute-rotation-btn').disabled = false;
                document.getElementById('execute-rotation-btn').innerHTML = `
                    <i class="bi bi-play-fill me-2"></i>
                    执行轮换计划
                `;
            });
        }
        
        // 初始化矿机数据
        function initializeMiners(count) {
            if (!confirm(`确定要重新初始化${count}台矿机数据吗？这将重置所有现有数据。`)) {
                return;
            }
            
            // 显示加载中状态
            document.getElementById('initialize-miners-btn').disabled = true;
            document.getElementById('initialize-miners-btn').innerHTML = `
                <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                初始化中...
            `;
            
            fetch('/api/initialize-miners', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ count: count })
            })
            .then(response => response.json())
            .then(data => {
                // 恢复按钮状态
                document.getElementById('initialize-miners-btn').disabled = false;
                document.getElementById('initialize-miners-btn').innerHTML = `
                    <i class="bi bi-arrow-clockwise me-1"></i>
                    重新初始化
                `;
                
                if (data.success) {
                    showToast(data.message, 'success');
                    
                    // 刷新数据
                    loadSystemStatus();
                    loadMinersHealth();
                    loadMinersList();
                } else {
                    showToast('初始化矿机数据失败', 'danger');
                }
            })
            .catch(error => {
                console.error('初始化矿机数据出错:', error);
                showToast('初始化矿机数据出错', 'danger');
                
                // 恢复按钮状态
                document.getElementById('initialize-miners-btn').disabled = false;
                document.getElementById('initialize-miners-btn').innerHTML = `
                    <i class="bi bi-arrow-clockwise me-1"></i>
                    重新初始化
                `;
            });
        }
        
        // 显示提示框
        function showToast(message, type = 'info') {
            const toastContainer = document.getElementById('toast-container');
            const id = 'toast-' + Date.now();
            
            const toast = document.createElement('div');
            toast.className = `toast show align-items-center text-white bg-${type}`;
            toast.setAttribute('role', 'alert');
            toast.setAttribute('aria-live', 'assertive');
            toast.setAttribute('aria-atomic', 'true');
            toast.setAttribute('id', id);
            
            toast.innerHTML = `
                <div class="d-flex">
                    <div class="toast-body">
                        ${message}
                    </div>
                    <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                </div>
            `;
            
            toastContainer.appendChild(toast);
            
            // 自动关闭
            setTimeout(() => {
                const toastElement = document.getElementById(id);
                if (toastElement) {
                    toastContainer.removeChild(toastElement);
                }
            }, 3000);
        }
        
        // 格式化日期
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.getFullYear() + '-' + 
                   padZero(date.getMonth() + 1) + '-' + 
                   padZero(date.getDate());
        }
        
        // 补零
        function padZero(num) {
            return num.toString().padStart(2, '0');
        }
    </script>
</body>
</html>
