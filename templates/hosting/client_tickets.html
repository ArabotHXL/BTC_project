<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工单中心 - HashInsight 客户中心</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-dark">
    <div class="container-fluid">
        <!-- 导航栏 -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary">
            <div class="container-fluid">
                <a class="navbar-brand text-warning fw-bold" href="/client/">
                    <i class="bi bi-cpu"></i> 客户中心
                </a>
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="/client/">仪表板</a>
                    <a class="nav-link" href="/client/miners">我的矿机</a>
                    <a class="nav-link" href="/client/usage">使用查询</a>
                    <a class="nav-link active" href="/client/tickets">工单中心</a>
                </div>
            </div>
        </nav>

        <!-- 主内容 -->
        <div class="container-fluid py-4">
            <div class="row">
                <div class="col-12">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2 class="text-warning mb-0">
                            <i class="bi bi-ticket-perforated"></i> 工单中心
                        </h2>
                        <button class="btn btn-warning">
                            <i class="bi bi-plus-lg"></i> 新建工单
                        </button>
                    </div>

                    <!-- 工单概览 -->
                    <div class="row mb-4">
                        <div class="col-md-3">
                            <div class="card bg-secondary">
                                <div class="card-body text-center">
                                    <i class="bi bi-ticket-perforated fs-2 text-info"></i>
                                    <h5 class="card-title mt-2">总工单</h5>
                                    <h3 class="text-info">0</h3>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card bg-secondary">
                                <div class="card-body text-center">
                                    <i class="bi bi-clock fs-2 text-warning"></i>
                                    <h5 class="card-title mt-2">待处理</h5>
                                    <h3 class="text-warning">0</h3>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card bg-secondary">
                                <div class="card-body text-center">
                                    <i class="bi bi-gear fs-2 text-primary"></i>
                                    <h5 class="card-title mt-2">处理中</h5>
                                    <h3 class="text-primary">0</h3>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card bg-secondary">
                                <div class="card-body text-center">
                                    <i class="bi bi-check-circle fs-2 text-success"></i>
                                    <h5 class="card-title mt-2">已解决</h5>
                                    <h3 class="text-success">0</h3>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 工单列表 -->
                    <div class="card bg-secondary">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">我的工单</h5>
                            <div class="btn-group">
                                <button class="btn btn-outline-warning btn-sm">
                                    <i class="bi bi-filter"></i> 筛选
                                </button>
                            </div>
                        </div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-dark table-striped">
                                    <thead>
                                        <tr>
                                            <th>工单编号</th>
                                            <th>标题</th>
                                            <th>类型</th>
                                            <th>优先级</th>
                                            <th>状态</th>
                                            <th>创建时间</th>
                                            <th>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr>
                                            <td colspan="7" class="text-center text-muted py-4">
                                                <i class="bi bi-ticket-perforated fs-3"></i>
                                                <div class="mt-2">暂无工单记录</div>
                                                <small>遇到问题时可以新建工单</small>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
