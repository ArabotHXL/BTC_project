<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账单查询 - HashInsight 客户中心</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-dark">
    <div class="container-fluid">
        <!-- 导航栏 -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary">
            <div class="container-fluid">
                <a class="navbar-brand text-warning fw-bold" href="/client/">
                    <i class="bi bi-cpu"></i> 客户中心
                </a>
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="/client/">仪表板</a>
                    <a class="nav-link" href="/client/miners">我的矿机</a>
                    <a class="nav-link active" href="/client/billing">账单查询</a>
                    <a class="nav-link" href="/client/tickets">工单中心</a>
                </div>
            </div>
        </nav>

        <!-- 主内容 -->
        <div class="container-fluid py-4">
            <div class="row">
                <div class="col-12">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2 class="text-warning mb-0">
                            <i class="bi bi-receipt"></i> 账单查询
                        </h2>
                    </div>

                    <!-- 账单概览 -->
                    <div class="row mb-4">
                        <div class="col-md-4">
                            <div class="card bg-secondary">
                                <div class="card-body text-center">
                                    <i class="bi bi-receipt fs-2 text-warning"></i>
                                    <h5 class="card-title mt-2">本月账单</h5>
                                    <h3 class="text-warning">$0.00</h3>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card bg-secondary">
                                <div class="card-body text-center">
                                    <i class="bi bi-check-circle fs-2 text-success"></i>
                                    <h5 class="card-title mt-2">已付账单</h5>
                                    <h3 class="text-success">$0.00</h3>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card bg-secondary">
                                <div class="card-body text-center">
                                    <i class="bi bi-exclamation-triangle fs-2 text-danger"></i>
                                    <h5 class="card-title mt-2">待付账单</h5>
                                    <h3 class="text-danger">$0.00</h3>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 账单历史 -->
                    <div class="card bg-secondary">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">账单历史</h5>
                            <div class="btn-group">
                                <button class="btn btn-outline-warning btn-sm">
                                    <i class="bi bi-filter"></i> 筛选
                                </button>
                                <button class="btn btn-outline-warning btn-sm">
                                    <i class="bi bi-download"></i> 导出
                                </button>
                            </div>
                        </div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-dark table-striped">
                                    <thead>
                                        <tr>
                                            <th>账单编号</th>
                                            <th>账单月份</th>
                                            <th>矿机数量</th>
                                            <th>电费</th>
                                            <th>托管费</th>
                                            <th>总金额</th>
                                            <th>状态</th>
                                            <th>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr>
                                            <td colspan="8" class="text-center text-muted py-4">
                                                <i class="bi bi-receipt fs-3"></i>
                                                <div class="mt-2">暂无账单数据</div>
                                                <small>请等待托管方生成账单</small>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
