
{% extends "base.html" %}

{% block title %}托管服务商仪表板 - BTC Mining Calculator{% endblock %}

{% block content %}
<div class="container-fluid">
    <!-- 页面标题 -->
    <div class="row mb-4">
        <div class="col-12">
            <h1 class="h3 mb-0">
                <i class="bi bi-building"></i> 托管服务商仪表板
            </h1>
            <p class="text-muted">管理托管站点、设备和客户</p>
        </div>
    </div>

    <!-- 概览卡片 -->
    <div class="row mb-4">
        <div class="col-lg-3 col-md-6 mb-3">
            <div class="card bg-primary text-white">
                <div class="card-body">
                    <div class="d-flex justify-content-between">
                        <div>
                            <h4 class="card-title" id="total-sites">--</h4>
                            <p class="card-text">托管站点</p>
                        </div>
                        <i class="bi bi-geo-alt fs-1"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-lg-3 col-md-6 mb-3">
            <div class="card bg-success text-white">
                <div class="card-body">
                    <div class="d-flex justify-content-between">
                        <div>
                            <h4 class="card-title" id="total-devices">--</h4>
                            <p class="card-text">托管设备</p>
                        </div>
                        <i class="bi bi-cpu fs-1"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-lg-3 col-md-6 mb-3">
            <div class="card bg-info text-white">
                <div class="card-body">
                    <div class="d-flex justify-content-between">
                        <div>
                            <h4 class="card-title" id="total-capacity">--</h4>
                            <p class="card-text">总容量 (MW)</p>
                        </div>
                        <i class="bi bi-lightning fs-1"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-lg-3 col-md-6 mb-3">
            <div class="card bg-warning text-white">
                <div class="card-body">
                    <div class="d-flex justify-content-between">
                        <div>
                            <h4 class="card-title" id="monthly-revenue">--</h4>
                            <p class="card-text">月度收入</p>
                        </div>
                        <i class="bi bi-currency-dollar fs-1"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 站点总览 -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="card-title mb-0">
                        <i class="bi bi-building"></i> 站点总览
                    </h5>
                    <button class="btn btn-primary btn-sm" onclick="refreshSites()">
                        <i class="bi bi-arrow-clockwise"></i> 刷新
                    </button>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover" id="sites-table">
                            <thead>
                                <tr>
                                    <th>站点名称</th>
                                    <th>位置</th>
                                    <th>容量利用率</th>
                                    <th>设备数量</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- 数据通过JavaScript加载 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 事件监控 -->
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0">
                        <i class="bi bi-exclamation-triangle"></i> 最新事件
                    </h5>
                </div>
                <div class="card-body">
                    <div id="events-list">
                        <!-- 事件列表通过JavaScript加载 -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    loadHostDashboard();
});

function loadHostDashboard() {
    // 加载站点数据
    fetch('/hosting/api/sites')
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                displaySites(data.sites);
                updateSummaryCards(data.sites);
            }
        })
        .catch(error => console.error('加载站点数据失败:', error));
}

function displaySites(sites) {
    const tbody = document.querySelector('#sites-table tbody');
    tbody.innerHTML = '';
    
    sites.forEach(site => {
        const utilizationPercent = ((site.used_capacity_mw / site.capacity_mw) * 100).toFixed(1);
        const statusBadge = site.status === 'online' ? 'success' : 'danger';
        
        const row = `
            <tr>
                <td><strong>${site.name}</strong></td>
                <td>${site.location}</td>
                <td>
                    <div class="progress" style="height: 20px;">
                        <div class="progress-bar" role="progressbar" 
                             style="width: ${utilizationPercent}%" 
                             aria-valuenow="${utilizationPercent}" 
                             aria-valuemin="0" aria-valuemax="100">
                            ${utilizationPercent}%
                        </div>
                    </div>
                    <small class="text-muted">${site.used_capacity_mw}/${site.capacity_mw} MW</small>
                </td>
                <td>${site.devices_count}</td>
                <td><span class="badge bg-${statusBadge}">${site.status}</span></td>
                <td>
                    <button class="btn btn-sm btn-outline-primary" onclick="viewSiteDetail(${site.id})">
                        <i class="bi bi-eye"></i> 查看
                    </button>
                </td>
            </tr>
        `;
        tbody.innerHTML += row;
    });
}

function updateSummaryCards(sites) {
    document.getElementById('total-sites').textContent = sites.length;
    document.getElementById('total-devices').textContent = sites.reduce((sum, site) => sum + site.devices_count, 0);
    document.getElementById('total-capacity').textContent = sites.reduce((sum, site) => sum + site.capacity_mw, 0).toFixed(1);
    document.getElementById('monthly-revenue').textContent = '$45,680'; // 示例数据
}

function refreshSites() {
    loadHostDashboard();
}

function viewSiteDetail(siteId) {
    // 跳转到站点详情页
    window.location.href = `/hosting/host/sites/${siteId}`;
}
</script>
{% endblock %}
