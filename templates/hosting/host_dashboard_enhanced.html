<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>托管方控制台 - HashInsight</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #ffffff;
            font-family: 'Inter', system-ui, sans-serif;
        }
        .kpi-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .kpi-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .kpi-label {
            opacity: 0.8;
            font-size: 0.9rem;
        }
        .chart-container {
            position: relative;
            height: 300px;
            margin: 20px 0;
        }
        .event-item {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid;
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 0 8px 8px 0;
        }
        .event-high { border-left-color: #ef4444; }
        .event-medium { border-left-color: #f59e0b; }
        .event-low { border-left-color: #22c55e; }
        .status-online { color: #22c55e; }
        .status-offline { color: #ef4444; }
        .status-maintenance { color: #f59e0b; }
    </style>
</head>
<body>
    <div class="container-fluid py-4">
        <!-- Sprint 1 - No Money Mode 声明 -->
        <div class="alert alert-warning mb-4">
            <i class="bi bi-exclamation-triangle me-2"></i>
            <strong>No Money Mode:</strong> 本系统不提供任何支付/托管/收益分发功能，仅用于展示和透明度管理。
        </div>

        <div class="row mb-4">
            <div class="col">
                <h1 class="mb-1">托管方控制台</h1>
                <p class="text-light opacity-75 mb-0">实时监控和管理托管设施</p>
            </div>
            <div class="col-auto">
                <button class="btn btn-outline-light me-2" onclick="refreshDashboard()">
                    <i class="bi bi-arrow-clockwise me-1"></i>刷新数据
                </button>
                <button class="btn btn-success" onclick="generateDemoData()">
                    <i class="bi bi-database me-1"></i>生成演示数据
                </button>
            </div>
        </div>

        <!-- KPI 仪表板 -->
        <div class="row mb-4">
            <div class="col-lg-3 col-md-6">
                <div class="kpi-card text-center">
                    <div class="kpi-value text-success" id="onlineMiners">-</div>
                    <div class="kpi-label">在线矿机</div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6">
                <div class="kpi-card text-center">
                    <div class="kpi-value text-info" id="totalHashrate">-</div>
                    <div class="kpi-label">总算力 (TH/s)</div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6">
                <div class="kpi-card text-center">
                    <div class="kpi-value text-warning" id="dailyOutput">-</div>
                    <div class="kpi-label">估算日产出 (BTC)</div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6">
                <div class="kpi-card text-center">
                    <div class="kpi-value text-danger" id="powerConsumption">-</div>
                    <div class="kpi-label">总功耗 (kW)</div>
                </div>
            </div>
        </div>

        <!-- 站点状态和事件时间线 -->
        <div class="row">
            <div class="col-lg-8">
                <div class="kpi-card">
                    <h5 class="mb-3">
                        <i class="bi bi-activity me-2"></i>
                        算力趋势
                    </h5>
                    <div class="chart-container">
                        <canvas id="hashrateChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="kpi-card">
                    <h5 class="mb-3">
                        <i class="bi bi-clock-history me-2"></i>
                        事件时间线
                    </h5>
                    <div id="eventsTimeline">
                        <div class="event-item event-low">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <h6 class="mb-1">系统正常运行</h6>
                                    <small>所有设施运行稳定</small>
                                </div>
                                <small>刚刚</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 站点概览 -->
        <div class="row mt-4">
            <div class="col-12">
                <div class="kpi-card">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="mb-0">
                            <i class="bi bi-building me-2"></i>
                            站点概览
                        </h5>
                        <a href="/hosting/sites" class="btn btn-outline-light btn-sm">
                            查看详情
                        </a>
                    </div>
                    <div class="row" id="sitesOverview">
                        <div class="col-md-6">
                            <div class="card bg-transparent border-secondary">
                                <div class="card-body">
                                    <h6 class="card-title">
                                        <span class="status-online">●</span>
                                        加载中...
                                    </h6>
                                    <p class="card-text small">请等待数据加载</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Sprint 1 - Enhanced Host Dashboard with KPI
        let hashrateChart;
        
        // 初始化图表
        function initHashrateChart() {
            const ctx = document.getElementById('hashrateChart').getContext('2d');
            hashrateChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: '总算力 (TH/s)',
                        data: [],
                        borderColor: '#22c55e',
                        backgroundColor: 'rgba(34, 197, 94, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: { color: '#ffffff' }
                        },
                        x: {
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: { color: '#ffffff' }
                        }
                    },
                    plugins: {
                        legend: { labels: { color: '#ffffff' } }
                    }
                }
            });
        }

        // 加载仪表板数据
        async function loadDashboardData() {
            try {
                // 加载KPI数据
                const response = await fetch('/hosting/api/kpi-summary');
                const data = await response.json();
                
                if (data.success) {
                    const kpi = data.kpi;
                    document.getElementById('onlineMiners').textContent = kpi.online_miners || '0';
                    document.getElementById('totalHashrate').textContent = (kpi.total_hashrate || 0).toFixed(1);
                    document.getElementById('dailyOutput').textContent = (kpi.daily_output || 0).toFixed(4);
                    document.getElementById('powerConsumption').textContent = (kpi.power_consumption || 0).toFixed(1);
                    
                    // 更新算力图表
                    if (kpi.hashrate_trend) {
                        hashrateChart.data.labels = kpi.hashrate_trend.labels;
                        hashrateChart.data.datasets[0].data = kpi.hashrate_trend.data;
                        hashrateChart.update();
                    }
                    
                    // 更新事件时间线
                    updateEventsTimeline(kpi.recent_events || []);
                    
                    // 更新站点概览
                    updateSitesOverview(kpi.sites || []);
                }
            } catch (error) {
                console.error('加载仪表板数据失败:', error);
                showError('数据加载失败，请稍后重试');
            }
        }
        
        // 更新事件时间线
        function updateEventsTimeline(events) {
            const timeline = document.getElementById('eventsTimeline');
            
            if (events.length === 0) {
                timeline.innerHTML = `
                    <div class="event-item event-low">
                        <div class="d-flex justify-content-between">
                            <div>
                                <h6 class="mb-1">系统运行正常</h6>
                                <small>没有需要关注的事件</small>
                            </div>
                            <small>当前</small>
                        </div>
                    </div>
                `;
                return;
            }
            
            timeline.innerHTML = events.map(event => `
                <div class="event-item event-${event.severity}">
                    <div class="d-flex justify-content-between">
                        <div>
                            <h6 class="mb-1">${event.title}</h6>
                            <small>${event.description || ''}</small>
                        </div>
                        <small>${event.time_ago}</small>
                    </div>
                </div>
            `).join('');
        }
        
        // 更新站点概览
        function updateSitesOverview(sites) {
            const container = document.getElementById('sitesOverview');
            
            if (sites.length === 0) {
                container.innerHTML = `
                    <div class="col-12">
                        <div class="text-center py-4">
                            <p class="text-muted">暂无站点数据，点击"生成演示数据"按钮创建示例数据</p>
                        </div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = sites.map(site => `
                <div class="col-md-6 mb-3">
                    <div class="card bg-transparent border-secondary">
                        <div class="card-body">
                            <h6 class="card-title">
                                <span class="status-${site.status}">●</span>
                                ${site.name}
                            </h6>
                            <p class="card-text small">
                                <i class="bi bi-geo-alt"></i> ${site.location}<br>
                                <i class="bi bi-speedometer2"></i> 利用率: ${site.utilization_rate}%<br>
                                <i class="bi bi-lightning"></i> ${site.used_capacity_mw}/${site.capacity_mw} MW
                            </p>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // 生成演示数据
        async function generateDemoData() {
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="bi bi-hourglass-split"></i> 生成中...';
            btn.disabled = true;
            
            try {
                const response = await fetch('/api/generate-demo-data', { method: 'POST' });
                const result = await response.json();
                
                if (result.success) {
                    showSuccess('演示数据生成成功！');
                    setTimeout(() => loadDashboardData(), 1000);
                } else {
                    showError('演示数据生成失败: ' + result.error);
                }
            } catch (error) {
                showError('请求失败: ' + error.message);
            }
            
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
        
        // 刷新仪表板
        function refreshDashboard() {
            loadDashboardData();
            showSuccess('数据已刷新');
        }
        
        // 显示通知
        function showSuccess(message) {
            // 简单的成功通知
            const alert = document.createElement('div');
            alert.className = 'alert alert-success position-fixed top-0 end-0 m-3';
            alert.style.zIndex = '9999';
            alert.innerHTML = message;
            document.body.appendChild(alert);
            setTimeout(() => alert.remove(), 3000);
        }
        
        function showError(message) {
            const alert = document.createElement('div');
            alert.className = 'alert alert-danger position-fixed top-0 end-0 m-3';
            alert.style.zIndex = '9999';
            alert.innerHTML = message;
            document.body.appendChild(alert);
            setTimeout(() => alert.remove(), 5000);
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            initHashrateChart();
            loadDashboardData();
            
            // 每60秒自动刷新数据 (Sprint 1 数据延迟≤60s要求)
            setInterval(loadDashboardData, 60000);
        });
    </script>
</body>
</html>
