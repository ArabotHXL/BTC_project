<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户控制台 - HashInsight</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #ffffff;
            font-family: 'Inter', system-ui, sans-serif;
        }
        .asset-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .status-online { color: #22c55e; }
        .status-offline { color: #ef4444; }
        .no-money-warning {
            background: rgba(251, 191, 36, 0.2);
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-radius: 12px;
            padding: 16px 20px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container-fluid py-4">
        <!-- Sprint 1 - No Money Mode 声明 -->
        <div class="alert alert-warning mb-4">
            <i class="bi bi-exclamation-triangle me-2"></i>
            <strong>No Money Mode:</strong> 本系统不提供任何支付/托管/收益分发功能，仅用于展示和透明度管理。
        </div>

        <div class="row mb-4">
            <div class="col">
                <h1 class="mb-1">客户控制台</h1>
                <p class="text-light opacity-75 mb-0">监控您的矿机资产和收益状况</p>
            </div>
            <div class="col-auto">
                <a href="/" class="btn btn-outline-light me-2">
                    <i class="bi bi-house me-1"></i>返回主页
                </a>
                <button class="btn btn-primary" onclick="loadAssetData()">
                    <i class="bi bi-arrow-clockwise me-1"></i>刷新数据
                </button>
            </div>
        </div>

        <!-- 个人资产概览 -->
        <div class="row mb-4">
            <div class="col-lg-3 col-md-6">
                <div class="asset-card text-center">
                    <div class="h2 text-info mb-2" id="totalMiners">-</div>
                    <div class="small">我的矿机总数</div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6">
                <div class="asset-card text-center">
                    <div class="h2 text-success mb-2" id="onlineMiners">-</div>
                    <div class="small">在线矿机</div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6">
                <div class="asset-card text-center">
                    <div class="h2 text-warning mb-2" id="totalHashrate">- TH/s</div>
                    <div class="small">总算力</div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6">
                <div class="asset-card text-center">
                    <div class="h2 text-primary mb-2" id="estimatedEarnings">- BTC</div>
                    <div class="small">估算日收益</div>
                </div>
            </div>
        </div>

        <!-- 矿机列表 -->
        <div class="row">
            <div class="col-lg-8">
                <div class="asset-card">
                    <h5 class="mb-3">
                        <i class="bi bi-cpu me-2"></i>
                        我的矿机
                    </h5>
                    <div class="table-responsive">
                        <table class="table table-dark table-hover">
                            <thead>
                                <tr>
                                    <th>序列号</th>
                                    <th>型号</th>
                                    <th>状态</th>
                                    <th>算力 (TH/s)</th>
                                    <th>功耗 (W)</th>
                                    <th>位置</th>
                                </tr>
                            </thead>
                            <tbody id="minersTable">
                                <tr>
                                    <td colspan="6" class="text-center text-muted">
                                        暂无数据，请先生成演示数据
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="asset-card">
                    <h5 class="mb-3">
                        <i class="bi bi-bell me-2"></i>
                        系统公告
                    </h5>
                    <div id="announcements">
                        <div class="d-flex align-items-start mb-3">
                            <i class="bi bi-info-circle text-info me-2 mt-1"></i>
                            <div>
                                <h6 class="mb-1">欢迎使用客户控制台</h6>
                                <small class="text-muted">您可以在这里监控矿机状态和收益</small>
                            </div>
                        </div>
                        <div class="d-flex align-items-start mb-3">
                            <i class="bi bi-shield-check text-success me-2 mt-1"></i>
                            <div>
                                <h6 class="mb-1">No Money Mode</h6>
                                <small class="text-muted">本系统仅提供数据展示功能</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 加载客户资产数据
        async function loadAssetData() {
            try {
                // 模拟数据加载
                document.getElementById('totalMiners').textContent = '5';
                document.getElementById('onlineMiners').textContent = '4';
                document.getElementById('totalHashrate').textContent = '520.5';
                document.getElementById('estimatedEarnings').textContent = '0.0032';
                
                // 更新矿机表格
                const tableBody = document.getElementById('minersTable');
                tableBody.innerHTML = `
                    <tr>
                        <td>TX-S21-001</td>
                        <td>Antminer S21</td>
                        <td><span class="status-online">● 在线</span></td>
                        <td>195.2</td>
                        <td>3420</td>
                        <td>机架-1-位置-A</td>
                    </tr>
                    <tr>
                        <td>TX-S21-002</td>
                        <td>Antminer S21</td>
                        <td><span class="status-online">● 在线</span></td>
                        <td>198.7</td>
                        <td>3380</td>
                        <td>机架-1-位置-B</td>
                    </tr>
                    <tr>
                        <td>MT-M50-001</td>
                        <td>Whatsminer M50S</td>
                        <td><span class="status-offline">● 离线</span></td>
                        <td>0</td>
                        <td>0</td>
                        <td>机架-2-位置-C</td>
                    </tr>
                `;
                
                console.log('客户资产数据已更新');
            } catch (error) {
                console.error('加载数据失败:', error);
            }
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadAssetData();
            console.log('🎯 客户控制台已加载');
        });
    </script>
</body>
</html>
