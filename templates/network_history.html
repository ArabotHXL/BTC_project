<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网络历史数据分析 | BTC Mining Calculator</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.replit.com/agent/bootstrap-agent-dark-theme.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        .stat-card {
            transition: transform 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .chart-container {
            position: relative;
            height: 400px;
            margin: 20px 0;
        }
        .metric-value {
            font-size: 2rem;
            font-weight: bold;
        }
        .metric-change {
            font-size: 0.9rem;
        }
        .metric-change.positive {
            color: #28a745;
        }
        .metric-change.negative {
            color: #dc3545;
        }
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
        }
    </style>
</head>
<body>
    <div class="container-fluid mt-4">
        <!-- 页面标题 -->
        <div class="row mb-4">
            <div class="col">
                <h1 class="h2">
                    <i class="bi bi-graph-up me-2"></i>
                    网络历史数据分析
                </h1>
                <p class="text-muted">基于历史数据的BTC网络趋势分析和挖矿收益预测</p>
            </div>
            <div class="col-auto">
                <button id="recordSnapshot" class="btn btn-primary">
                    <i class="bi bi-camera me-1"></i>记录当前快照
                </button>
                <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i>返回主页
                </a>
            </div>
        </div>

        <!-- 网络统计概览 -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card stat-card h-100">
                    <div class="card-body text-center">
                        <i class="bi bi-currency-bitcoin text-warning mb-2" style="font-size: 2rem;"></i>
                        <h5>当前BTC价格</h5>
                        <div id="currentPrice" class="metric-value">$0</div>
                        <div id="priceChange" class="metric-change">-</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card h-100">
                    <div class="card-body text-center">
                        <i class="bi bi-gear text-info mb-2" style="font-size: 2rem;"></i>
                        <h5>网络难度</h5>
                        <div id="currentDifficulty" class="metric-value">0T</div>
                        <div id="difficultyChange" class="metric-change">-</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card h-100">
                    <div class="card-body text-center">
                        <i class="bi bi-speedometer text-success mb-2" style="font-size: 2rem;"></i>
                        <h5>网络算力</h5>
                        <div id="currentHashrate" class="metric-value">0 EH/s</div>
                        <div id="hashrateChange" class="metric-change">-</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card h-100">
                    <div class="card-body text-center">
                        <i class="bi bi-database text-primary mb-2" style="font-size: 2rem;"></i>
                        <h5>数据记录</h5>
                        <div id="totalRecords" class="metric-value">0</div>
                        <div id="dataCoverage" class="metric-change">覆盖天数: 0</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 图表选项卡 -->
        <div class="row">
            <div class="col">
                <ul class="nav nav-tabs" id="chartTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="price-tab" data-bs-toggle="tab" data-bs-target="#price-panel" type="button" role="tab">
                            <i class="bi bi-currency-dollar me-1"></i>价格趋势
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="difficulty-tab" data-bs-toggle="tab" data-bs-target="#difficulty-panel" type="button" role="tab">
                            <i class="bi bi-graph-up me-1"></i>难度变化
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="hashrate-tab" data-bs-toggle="tab" data-bs-target="#hashrate-panel" type="button" role="tab">
                            <i class="bi bi-speedometer2 me-1"></i>算力分析
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="forecast-tab" data-bs-toggle="tab" data-bs-target="#forecast-panel" type="button" role="tab">
                            <i class="bi bi-crystal-ball me-1"></i>收益预测
                        </button>
                    </li>
                </ul>

                <div class="tab-content" id="chartTabContent">
                    <!-- 价格趋势面板 -->
                    <div class="tab-pane fade show active" id="price-panel" role="tabpanel">
                        <div class="card">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h5 class="mb-0">BTC价格趋势分析</h5>
                                <div class="btn-group btn-group-sm" role="group">
                                    <button type="button" class="btn btn-outline-primary price-period" data-days="1">24小时</button>
                                    <button type="button" class="btn btn-outline-primary price-period active" data-days="7">7天</button>
                                    <button type="button" class="btn btn-outline-primary price-period" data-days="30">30天</button>
                                </div>
                            </div>
                            <div class="card-body">
                                <div id="priceLoading" class="loading-spinner">
                                    <div class="spinner-border text-primary" role="status">
                                        <span class="visually-hidden">加载中...</span>
                                    </div>
                                </div>
                                <div class="chart-container">
                                    <canvas id="priceChart"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 难度变化面板 -->
                    <div class="tab-pane fade" id="difficulty-panel" role="tabpanel">
                        <div class="card">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h5 class="mb-0">网络难度调整趋势</h5>
                                <div class="btn-group btn-group-sm" role="group">
                                    <button type="button" class="btn btn-outline-info difficulty-period" data-days="7">7天</button>
                                    <button type="button" class="btn btn-outline-info difficulty-period active" data-days="30">30天</button>
                                    <button type="button" class="btn btn-outline-info difficulty-period" data-days="90">90天</button>
                                </div>
                            </div>
                            <div class="card-body">
                                <div id="difficultyLoading" class="loading-spinner">
                                    <div class="spinner-border text-info" role="status">
                                        <span class="visually-hidden">加载中...</span>
                                    </div>
                                </div>
                                <div class="chart-container">
                                    <canvas id="difficultyChart"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 算力分析面板 -->
                    <div class="tab-pane fade" id="hashrate-panel" role="tabpanel">
                        <div class="card">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h5 class="mb-0">全网算力变化分析</h5>
                                <div class="btn-group btn-group-sm" role="group">
                                    <button type="button" class="btn btn-outline-success hashrate-period" data-days="1">24小时</button>
                                    <button type="button" class="btn btn-outline-success hashrate-period active" data-days="7">7天</button>
                                    <button type="button" class="btn btn-outline-success hashrate-period" data-days="14">14天</button>
                                </div>
                            </div>
                            <div class="card-body">
                                <div id="hashrateLoading" class="loading-spinner">
                                    <div class="spinner-border text-success" role="status">
                                        <span class="visually-hidden">加载中...</span>
                                    </div>
                                </div>
                                <div class="chart-container">
                                    <canvas id="hashrateChart"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 收益预测面板 -->
                    <div class="tab-pane fade" id="forecast-panel" role="tabpanel">
                        <div class="card">
                            <div class="card-header">
                                <h5 class="mb-0">基于历史数据的收益预测</h5>
                            </div>
                            <div class="card-body">
                                <div class="row mb-3">
                                    <div class="col-md-4">
                                        <label for="forecastMiner" class="form-label">矿机型号</label>
                                        <select class="form-select" id="forecastMiner">
                                            <option value="Antminer S21">Antminer S21</option>
                                            <option value="Antminer S19 Pro">Antminer S19 Pro</option>
                                            <option value="Antminer S19j Pro">Antminer S19j Pro</option>
                                            <option value="Whatsminer M50S">Whatsminer M50S</option>
                                            <option value="Whatsminer M53S">Whatsminer M53S</option>
                                        </select>
                                    </div>
                                    <div class="col-md-3">
                                        <label for="forecastElectricity" class="form-label">电费成本 ($/kWh)</label>
                                        <input type="number" class="form-control" id="forecastElectricity" value="0.05" step="0.01" min="0">
                                    </div>
                                    <div class="col-md-3">
                                        <label for="forecastDays" class="form-label">分析天数</label>
                                        <select class="form-select" id="forecastDays">
                                            <option value="7">过去7天</option>
                                            <option value="14">过去14天</option>
                                            <option value="30" selected>过去30天</option>
                                            <option value="60">过去60天</option>
                                        </select>
                                    </div>
                                    <div class="col-md-2">
                                        <label class="form-label">&nbsp;</label>
                                        <button class="btn btn-primary w-100" id="updateForecast">更新预测</button>
                                    </div>
                                </div>
                                
                                <div id="forecastResults" class="row">
                                    <div class="col-md-6">
                                        <div class="card">
                                            <div class="card-header">
                                                <h6 class="mb-0">预测统计</h6>
                                            </div>
                                            <div class="card-body">
                                                <div id="forecastStats">
                                                    <div class="text-center text-muted">
                                                        <i class="bi bi-graph-up" style="font-size: 3rem;"></i>
                                                        <p class="mt-2">点击"更新预测"查看收益分析</p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="chart-container">
                                            <canvas id="forecastChart"></canvas>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // 全局变量
        let priceChart = null;
        let difficultyChart = null;
        let hashrateChart = null;
        let forecastChart = null;

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadNetworkStats();
            loadPriceTrend(7);
            setupEventListeners();
        });

        // 设置事件监听器
        function setupEventListeners() {
            // 价格趋势时间段选择
            document.querySelectorAll('.price-period').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.price-period').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    loadPriceTrend(parseInt(this.dataset.days));
                });
            });

            // 难度趋势时间段选择
            document.querySelectorAll('.difficulty-period').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.difficulty-period').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    loadDifficultyTrend(parseInt(this.dataset.days));
                });
            });

            // 算力分析时间段选择
            document.querySelectorAll('.hashrate-period').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.hashrate-period').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    loadHashrateAnalysis(parseInt(this.dataset.days));
                });
            });

            // 选项卡切换事件
            document.getElementById('difficulty-tab').addEventListener('click', () => {
                setTimeout(() => loadDifficultyTrend(30), 100);
            });
            
            document.getElementById('hashrate-tab').addEventListener('click', () => {
                setTimeout(() => loadHashrateAnalysis(7), 100);
            });

            // 收益预测更新
            document.getElementById('updateForecast').addEventListener('click', updateProfitabilityForecast);

            // 记录快照
            document.getElementById('recordSnapshot').addEventListener('click', recordNetworkSnapshot);
        }

        // 加载网络统计概览
        async function loadNetworkStats() {
            try {
                const response = await fetch('/api/network/stats');
                const data = await response.json();

                if (data.error) {
                    console.error('获取网络统计失败:', data.error);
                    return;
                }

                // 更新统计卡片
                if (data.latest_record) {
                    document.getElementById('currentPrice').textContent = `$${data.latest_record.btc_price.toLocaleString()}`;
                    document.getElementById('currentDifficulty').textContent = `${data.latest_record.network_difficulty.toFixed(2)}T`;
                    document.getElementById('currentHashrate').textContent = `${data.latest_record.network_hashrate.toFixed(1)} EH/s`;
                }

                document.getElementById('totalRecords').textContent = data.total_records.toLocaleString();
                if (data.data_coverage_days) {
                    document.getElementById('dataCoverage').textContent = `覆盖天数: ${data.data_coverage_days}`;
                }

                // 更新变化指标
                if (data['24h_changes']) {
                    updateChangeIndicator('priceChange', data['24h_changes'].price_change_percent, '%');
                }
                if (data['7d_changes']) {
                    updateChangeIndicator('difficultyChange', data['7d_changes'].difficulty_change_percent, '%');
                }

            } catch (error) {
                console.error('加载网络统计失败:', error);
            }
        }

        // 更新变化指标
        function updateChangeIndicator(elementId, value, suffix = '') {
            const element = document.getElementById(elementId);
            if (value > 0) {
                element.className = 'metric-change positive';
                element.innerHTML = `<i class="bi bi-arrow-up"></i> +${value.toFixed(2)}${suffix}`;
            } else if (value < 0) {
                element.className = 'metric-change negative';
                element.innerHTML = `<i class="bi bi-arrow-down"></i> ${value.toFixed(2)}${suffix}`;
            } else {
                element.className = 'metric-change';
                element.innerHTML = `${value.toFixed(2)}${suffix}`;
            }
        }

        // 加载价格趋势
        async function loadPriceTrend(days) {
            document.getElementById('priceLoading').style.display = 'flex';
            
            try {
                const response = await fetch(`/api/network/price-trend?days=${days}`);
                const data = await response.json();

                if (data.error) {
                    console.error('获取价格趋势失败:', data.error);
                    return;
                }

                createPriceChart(data);
            } catch (error) {
                console.error('加载价格趋势失败:', error);
            } finally {
                document.getElementById('priceLoading').style.display = 'none';
            }
        }

        // 创建价格图表
        function createPriceChart(data) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            
            if (priceChart) {
                priceChart.destroy();
            }

            priceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.timestamps.map(t => new Date(t)),
                    datasets: [{
                        label: 'BTC价格 ($)',
                        data: data.prices,
                        borderColor: '#f7931a',
                        backgroundColor: 'rgba(247, 147, 26, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: {
                                displayFormats: {
                                    hour: 'HH:mm',
                                    day: 'MM-dd',
                                    week: 'MM-dd'
                                }
                            }
                        },
                        y: {
                            beginAtZero: false,
                            ticks: {
                                callback: function(value) {
                                    return '$' + value.toLocaleString();
                                }
                            }
                        }
                    }
                }
            });
        }

        // 加载难度趋势
        async function loadDifficultyTrend(days) {
            document.getElementById('difficultyLoading').style.display = 'flex';
            
            try {
                const response = await fetch(`/api/network/difficulty-trend?days=${days}`);
                const data = await response.json();

                if (data.error) {
                    console.error('获取难度趋势失败:', data.error);
                    return;
                }

                createDifficultyChart(data);
            } catch (error) {
                console.error('加载难度趋势失败:', error);
            } finally {
                document.getElementById('difficultyLoading').style.display = 'none';
            }
        }

        // 创建难度图表
        function createDifficultyChart(data) {
            const ctx = document.getElementById('difficultyChart').getContext('2d');
            
            if (difficultyChart) {
                difficultyChart.destroy();
            }

            difficultyChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.timestamps.map(t => new Date(t)),
                    datasets: [{
                        label: '网络难度 (T)',
                        data: data.difficulties,
                        borderColor: '#17a2b8',
                        backgroundColor: 'rgba(23, 162, 184, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: {
                                displayFormats: {
                                    hour: 'HH:mm',
                                    day: 'MM-dd',
                                    week: 'MM-dd'
                                }
                            }
                        },
                        y: {
                            beginAtZero: false,
                            ticks: {
                                callback: function(value) {
                                    return value.toFixed(2) + 'T';
                                }
                            }
                        }
                    }
                }
            });
        }

        // 加载算力分析
        async function loadHashrateAnalysis(days) {
            document.getElementById('hashrateLoading').style.display = 'flex';
            
            try {
                const response = await fetch(`/api/network/hashrate-analysis?days=${days}`);
                const data = await response.json();

                if (data.error) {
                    console.error('获取算力分析失败:', data.error);
                    return;
                }

                createHashrateChart(data);
            } catch (error) {
                console.error('加载算力分析失败:', error);
            } finally {
                document.getElementById('hashrateLoading').style.display = 'none';
            }
        }

        // 创建算力图表
        function createHashrateChart(data) {
            const ctx = document.getElementById('hashrateChart').getContext('2d');
            
            if (hashrateChart) {
                hashrateChart.destroy();
            }

            hashrateChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.timestamps.map(t => new Date(t)),
                    datasets: [{
                        label: '网络算力 (EH/s)',
                        data: data.hashrates,
                        borderColor: '#28a745',
                        backgroundColor: 'rgba(40, 167, 69, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: {
                                displayFormats: {
                                    hour: 'HH:mm',
                                    day: 'MM-dd',
                                    week: 'MM-dd'
                                }
                            }
                        },
                        y: {
                            beginAtZero: false,
                            ticks: {
                                callback: function(value) {
                                    return value.toFixed(1) + ' EH/s';
                                }
                            }
                        }
                    }
                }
            });
        }

        // 更新收益预测
        async function updateProfitabilityForecast() {
            const miner = document.getElementById('forecastMiner').value;
            const electricity = document.getElementById('forecastElectricity').value;
            const days = document.getElementById('forecastDays').value;

            try {
                const response = await fetch(`/api/network/profitability-forecast?miner_model=${encodeURIComponent(miner)}&electricity_cost=${electricity}&days_back=${days}`);
                const data = await response.json();

                if (data.error) {
                    alert('获取收益预测失败: ' + data.error);
                    return;
                }

                displayForecastResults(data);
                createForecastChart(data);
            } catch (error) {
                console.error('更新收益预测失败:', error);
                alert('更新收益预测失败');
            }
        }

        // 显示预测结果
        function displayForecastResults(data) {
            const statsDiv = document.getElementById('forecastStats');
            statsDiv.innerHTML = `
                <div class="row g-3">
                    <div class="col-6">
                        <div class="text-center">
                            <div class="text-muted small">日均利润</div>
                            <div class="fw-bold ${data.avg_daily_profit > 0 ? 'text-success' : 'text-danger'}">
                                $${data.avg_daily_profit.toFixed(2)}
                            </div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="text-center">
                            <div class="text-muted small">月收益估算</div>
                            <div class="fw-bold ${data.monthly_profit_estimate > 0 ? 'text-success' : 'text-danger'}">
                                $${data.monthly_profit_estimate.toFixed(2)}
                            </div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="text-center">
                            <div class="text-muted small">盈利率</div>
                            <div class="fw-bold">${data.profitability_rate.toFixed(1)}%</div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="text-center">
                            <div class="text-muted small">数据点数</div>
                            <div class="fw-bold">${data.data_points}</div>
                        </div>
                    </div>
                </div>
                <hr>
                <div class="row">
                    <div class="col-12">
                        <small class="text-muted">
                            矿机: ${data.miner_model} (${data.hashrate_th}TH/s, ${data.power_w}W)<br>
                            电费: $${data.electricity_cost}/kWh | 分析周期: ${data.analysis_period}天
                        </small>
                    </div>
                </div>
            `;
        }

        // 创建预测图表
        function createForecastChart(data) {
            const ctx = document.getElementById('forecastChart').getContext('2d');
            
            if (forecastChart) {
                forecastChart.destroy();
            }

            const profits = data.daily_profits.map(p => p.daily_profit);
            const dates = data.daily_profits.map(p => new Date(p.date));

            forecastChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [{
                        label: '每日净利润 ($)',
                        data: profits,
                        borderColor: profits[profits.length - 1] > 0 ? '#28a745' : '#dc3545',
                        backgroundColor: profits[profits.length - 1] > 0 ? 'rgba(40, 167, 69, 0.1)' : 'rgba(220, 53, 69, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: {
                                displayFormats: {
                                    day: 'MM-dd'
                                }
                            }
                        },
                        y: {
                            ticks: {
                                callback: function(value) {
                                    return '$' + value.toFixed(2);
                                }
                            }
                        }
                    }
                }
            });
        }

        // 记录网络快照
        async function recordNetworkSnapshot() {
            const btn = document.getElementById('recordSnapshot');
            const originalText = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-hourglass-split me-1"></i>记录中...';

            try {
                const response = await fetch('/api/network/record-snapshot', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('网络快照记录成功！');
                    loadNetworkStats(); // 刷新统计数据
                } else {
                    alert('记录失败: ' + (data.error || '未知错误'));
                }
            } catch (error) {
                console.error('记录快照失败:', error);
                alert('记录快照失败');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }
    </script>
</body>
</html>
