<!DOCTYPE html>
<html lang="{{ 'zh-CN' if current_lang == 'zh' else 'en' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t('login_title') }}</title>
    <link rel="stylesheet" href="https://cdn.replit.com/agent/bootstrap-agent-dark-theme.min.css">
    <style>
        body {
            background-color: #121212;
            color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            background-color: rgba(33, 37, 41, 0.9);
            border-radius: 0.5rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #f8d000;
            font-size: 2rem;
            font-weight: bold;
        }
        .login-form .form-control {
            background-color: #2b3035;
            border-color: #495057;
            color: #e9ecef;
        }
        .login-form .form-control:focus {
            border-color: #f8d000;
            box-shadow: 0 0 0 0.25rem rgba(248, 208, 0, 0.25);
        }
        .login-form .btn-primary {
            background-color: #f8d000;
            border-color: #f8d000;
            color: #212529;
            font-weight: bold;
        }
        .login-form .btn-primary:hover {
            background-color: #e6c400;
            border-color: #e6c400;
        }
        .alert {
            margin-bottom: 1.5rem;
        }
        .btc-icon {
            display: inline-block;
            width: 60px;
            height: 60px;
            background-color: #f8d000; /* 恢复黄色背景 */
            border-radius: 50%;
            text-align: center;
            line-height: 60px;
            font-size: 2rem;
            margin-bottom: 1rem;
            transform: rotate(12deg);
            color: #dc3545; /* 比特币符号使用红色 */
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="login-container">
                    <div class="login-logo">
                        <div class="btc-icon">₿</div>
                        <div>{{ t('btc_mining_calculator') }}</div>
                    </div>
                    
                    <!-- 语言切换 / Language Switcher -->
                    <div class="text-center mb-3">
                        <div class="btn-group btn-group-sm" role="group" aria-label="{{ t('language') }}">
                            <a href="{{ url_for('login', lang='zh') }}" class="btn btn-outline-light {{ 'active' if current_lang == 'zh' else '' }}">中文</a>
                            <a href="{{ url_for('login', lang='en') }}" class="btn btn-outline-light {{ 'active' if current_lang == 'en' else '' }}">English</a>
                        </div>
                    </div>
                    
                    <!-- 消息提示 / Flash Messages -->
                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }}" role="alert">
                                    {{ message }}
                                </div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}
                    
                    <div class="card-body">
                        <h5 class="card-title text-center mb-4">{{ t('email_verification_login') }}</h5>
                        <form class="login-form" method="post" action="{{ url_for('login') }}">
                            <div class="mb-3">
                                <label for="email" class="form-label">邮箱或用户名</label>
                                <input type="text" class="form-control" id="email" name="email" 
                                       placeholder="输入邮箱地址或用户名" required autofocus>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">密码</label>
                                <input type="password" class="form-control" id="password" name="password" 
                                       placeholder="输入密码（新用户密码可选）">
                                <div class="form-text text-muted">新注册用户请先注册账户</div>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">{{ t('login') }}</button>
                            </div>
                        </form>
                        <div class="text-center mt-4">
                            <p class="text-muted">
                                还没有账户？ 
                                <a href="{{ url_for('register') }}" class="text-primary text-decoration-none">
                                    立即注册
                                </a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
