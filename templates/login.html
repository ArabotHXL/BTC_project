<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - BTC挖矿计算器</title>
    <link rel="stylesheet" href="https://cdn.replit.com/agent/bootstrap-agent-dark-theme.min.css">
    <style>
        body {
            background-color: #121212;
            color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            background-color: rgba(33, 37, 41, 0.9);
            border-radius: 0.5rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #f8d000;
            font-size: 2rem;
            font-weight: bold;
        }
        .login-form .form-control {
            background-color: #2b3035;
            border-color: #495057;
            color: #e9ecef;
        }
        .login-form .form-control:focus {
            border-color: #f8d000;
            box-shadow: 0 0 0 0.25rem rgba(248, 208, 0, 0.25);
        }
        .login-form .btn-primary {
            background-color: #f8d000;
            border-color: #f8d000;
            color: #212529;
            font-weight: bold;
        }
        .login-form .btn-primary:hover {
            background-color: #e6c400;
            border-color: #e6c400;
        }
        .alert {
            margin-bottom: 1.5rem;
        }
        .btc-icon {
            display: inline-block;
            width: 60px;
            height: 60px;
            background-color: #f8d000;
            border-radius: 50%;
            text-align: center;
            line-height: 60px;
            font-size: 2rem;
            margin-bottom: 1rem;
            transform: rotate(12deg);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="login-container">
                    <div class="login-logo">
                        <div class="btc-icon">₿</div>
                        <div>BTC挖矿计算器</div>
                    </div>
                    
                    <!-- 消息提示 -->
                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }}" role="alert">
                                    {{ message }}
                                </div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}
                    
                    <div class="card-body">
                        <h5 class="card-title text-center mb-4">邮箱验证登录</h5>
                        <form class="login-form" method="post" action="{{ url_for('login') }}">
                            <div class="mb-3">
                                <label for="email" class="form-label">邮箱地址</label>
                                <input type="email" class="form-control" id="email" name="email" 
                                       placeholder="请输入授权邮箱" required autofocus>
                                <div class="form-text text-muted">请使用已获授权的邮箱地址登录。</div>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">登录</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
