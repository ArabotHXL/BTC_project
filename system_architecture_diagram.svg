<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Define gradients -->
    <linearGradient id="frontendGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="backendGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="databaseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="apiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
    <!-- Arrowhead marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="1000" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="700" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#2c3e50">
    BTC Mining Calculator System Architecture
  </text>
  <text x="700" y="65" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#7f8c8d">
    比特币挖矿计算器系统架构图
  </text>

  <!-- Frontend Layer -->
  <g id="frontend-layer">
    <rect x="50" y="100" width="1300" height="180" rx="10" fill="url(#frontendGradient)" opacity="0.1"/>
    <text x="70" y="130" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#667eea">Frontend Layer 前端层</text>
    
    <!-- UI Components -->
    <rect x="100" y="150" width="200" height="100" rx="5" fill="white" stroke="#667eea" stroke-width="2"/>
    <text x="200" y="180" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">Templates (Jinja2)</text>
    <text x="200" y="200" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• index.html</text>
    <text x="200" y="215" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• analytics_main.html</text>
    <text x="200" y="230" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• calculator.html</text>

    <rect x="330" y="150" width="200" height="100" rx="5" fill="white" stroke="#667eea" stroke-width="2"/>
    <text x="430" y="180" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">Static Assets</text>
    <text x="430" y="200" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Bootstrap 5 (Dark)</text>
    <text x="430" y="215" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Chart.js</text>
    <text x="430" y="230" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Custom CSS/JS</text>

    <rect x="560" y="150" width="200" height="100" rx="5" fill="white" stroke="#667eea" stroke-width="2"/>
    <text x="660" y="180" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">Bilingual Support</text>
    <text x="660" y="200" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Chinese (中文)</text>
    <text x="660" y="215" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• English</text>
    <text x="660" y="230" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Dynamic Switching</text>

    <rect x="790" y="150" width="200" height="100" rx="5" fill="white" stroke="#667eea" stroke-width="2"/>
    <text x="890" y="180" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">Interactive Features</text>
    <text x="890" y="200" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Quick Insights</text>
    <text x="890" y="215" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Real-time Charts</text>
    <text x="890" y="230" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• AJAX Updates</text>

    <rect x="1020" y="150" width="200" height="100" rx="5" fill="white" stroke="#667eea" stroke-width="2"/>
    <text x="1120" y="180" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">Responsive Design</text>
    <text x="1120" y="200" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Mobile First</text>
    <text x="1120" y="215" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• 320px - 1200px+</text>
    <text x="1120" y="230" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• PWA Ready</text>
  </g>

  <!-- Backend Layer -->
  <g id="backend-layer">
    <rect x="50" y="320" width="1300" height="280" rx="10" fill="url(#backendGradient)" opacity="0.1"/>
    <text x="70" y="350" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#f5576c">Backend Layer 后端层</text>
    
    <!-- Core Flask App -->
    <rect x="100" y="370" width="250" height="80" rx="5" fill="white" stroke="#f5576c" stroke-width="2"/>
    <text x="225" y="395" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">Flask Core (app.py)</text>
    <text x="225" y="415" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• WSGI Server (Gunicorn)</text>
    <text x="225" y="430" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Session Management</text>

    <!-- Authentication -->
    <rect x="380" y="370" width="200" height="80" rx="5" fill="white" stroke="#f5576c" stroke-width="2"/>
    <text x="480" y="395" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">Authentication</text>
    <text x="480" y="415" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Email-based Login</text>
    <text x="480" y="430" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Role Management</text>

    <!-- Routes -->
    <rect x="610" y="370" width="200" height="80" rx="5" fill="white" stroke="#f5576c" stroke-width="2"/>
    <text x="710" y="395" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">Route Handlers</text>
    <text x="710" y="415" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Calculator Routes</text>
    <text x="710" y="430" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Analytics Routes</text>

    <!-- Subscription System -->
    <rect x="840" y="370" width="200" height="80" rx="5" fill="white" stroke="#f5576c" stroke-width="2"/>
    <text x="940" y="395" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">Subscription System</text>
    <text x="940" y="415" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Stripe Integration</text>
    <text x="940" y="430" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Tier Management</text>

    <!-- CRM System -->
    <rect x="1070" y="370" width="200" height="80" rx="5" fill="white" stroke="#f5576c" stroke-width="2"/>
    <text x="1170" y="395" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">CRM System</text>
    <text x="1170" y="415" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Customer Management</text>
    <text x="1170" y="430" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Sales Tracking</text>

    <!-- Services Row -->
    <rect x="100" y="470" width="200" height="100" rx="5" fill="white" stroke="#f5576c" stroke-width="2"/>
    <text x="200" y="495" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">Mining Calculator</text>
    <text x="200" y="515" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Dual Algorithm</text>
    <text x="200" y="530" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• 10+ ASIC Models</text>
    <text x="200" y="545" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• ROI Analysis</text>

    <rect x="330" y="470" width="200" height="100" rx="5" fill="white" stroke="#f5576c" stroke-width="2"/>
    <text x="430" y="495" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">Analytics Engine</text>
    <text x="430" y="515" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Market Analysis</text>
    <text x="430" y="530" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Technical Indicators</text>
    <text x="430" y="545" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• AI Recommendations</text>

    <rect x="560" y="470" width="200" height="100" rx="5" fill="white" stroke="#f5576c" stroke-width="2"/>
    <text x="660" y="495" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">Data Pipeline</text>
    <text x="660" y="515" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Real-time Collection</text>
    <text x="660" y="530" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Data Validation</text>
    <text x="660" y="545" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Cache Management</text>

    <rect x="790" y="470" width="200" height="100" rx="5" fill="white" stroke="#f5576c" stroke-width="2"/>
    <text x="890" y="495" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">Report Generator</text>
    <text x="890" y="515" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Professional Reports</text>
    <text x="890" y="530" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• PDF/PPT Export</text>
    <text x="890" y="545" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Email Distribution</text>

    <rect x="1020" y="470" width="200" height="100" rx="5" fill="white" stroke="#f5576c" stroke-width="2"/>
    <text x="1120" y="495" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">Background Jobs</text>
    <text x="1120" y="515" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Scheduler Service</text>
    <text x="1120" y="530" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Data Updates</text>
    <text x="1120" y="545" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Alert System</text>
  </g>

  <!-- Database Layer -->
  <g id="database-layer">
    <rect x="50" y="640" width="600" height="180" rx="10" fill="url(#databaseGradient)" opacity="0.1"/>
    <text x="70" y="670" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#4facfe">Database Layer 数据库层</text>
    
    <rect x="100" y="690" width="150" height="100" rx="5" fill="white" stroke="#4facfe" stroke-width="2"/>
    <text x="175" y="715" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">PostgreSQL</text>
    <text x="175" y="735" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Connection Pool</text>
    <text x="175" y="750" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Auto Reconnect</text>
    <text x="175" y="765" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Replication</text>

    <rect x="280" y="690" width="150" height="100" rx="5" fill="white" stroke="#4facfe" stroke-width="2"/>
    <text x="355" y="715" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">Data Models</text>
    <text x="355" y="735" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Users</text>
    <text x="355" y="750" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Subscriptions</text>
    <text x="355" y="765" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Market Data</text>

    <rect x="460" y="690" width="150" height="100" rx="5" fill="white" stroke="#4facfe" stroke-width="2"/>
    <text x="535" y="715" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">Historical Data</text>
    <text x="535" y="735" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• 2,983+ Records</text>
    <text x="535" y="750" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Price History</text>
    <text x="535" y="765" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Network Stats</text>
  </g>

  <!-- External APIs Layer -->
  <g id="api-layer">
    <rect x="700" y="640" width="650" height="180" rx="10" fill="url(#apiGradient)" opacity="0.1"/>
    <text x="720" y="670" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#43e97b">External APIs 外部接口</text>
    
    <rect x="750" y="690" width="140" height="100" rx="5" fill="white" stroke="#43e97b" stroke-width="2"/>
    <text x="820" y="715" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">CoinWarz</text>
    <text x="820" y="735" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Mining Data</text>
    <text x="820" y="750" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Profitability</text>
    <text x="820" y="765" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Multi-coin</text>

    <rect x="920" y="690" width="140" height="100" rx="5" fill="white" stroke="#43e97b" stroke-width="2"/>
    <text x="990" y="715" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">CoinGecko</text>
    <text x="990" y="735" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Real-time Price</text>
    <text x="990" y="750" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Market Cap</text>
    <text x="990" y="765" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Volume Data</text>

    <rect x="1090" y="690" width="140" height="100" rx="5" fill="white" stroke="#43e97b" stroke-width="2"/>
    <text x="1160" y="715" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">Blockchain.info</text>
    <text x="1160" y="735" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Network Stats</text>
    <text x="1160" y="750" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Difficulty</text>
    <text x="1160" y="765" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Hashrate</text>
  </g>

  <!-- Infrastructure Layer -->
  <g id="infrastructure-layer">
    <rect x="50" y="860" width="1300" height="100" rx="10" fill="#e0e0e0" opacity="0.3"/>
    <text x="70" y="890" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#666">Infrastructure 基础设施</text>
    
    <rect x="150" y="900" width="150" height="40" rx="5" fill="white" stroke="#666" stroke-width="2"/>
    <text x="225" y="925" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Replit Hosting</text>

    <rect x="330" y="900" width="150" height="40" rx="5" fill="white" stroke="#666" stroke-width="2"/>
    <text x="405" y="925" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Stripe Payments</text>

    <rect x="510" y="900" width="150" height="40" rx="5" fill="white" stroke="#666" stroke-width="2"/>
    <text x="585" y="925" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">SSL/TLS Security</text>

    <rect x="690" y="900" width="150" height="40" rx="5" fill="white" stroke="#666" stroke-width="2"/>
    <text x="765" y="925" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">CDN Distribution</text>

    <rect x="870" y="900" width="150" height="40" rx="5" fill="white" stroke="#666" stroke-width="2"/>
    <text x="945" y="925" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Monitoring</text>

    <rect x="1050" y="900" width="150" height="40" rx="5" fill="white" stroke="#666" stroke-width="2"/>
    <text x="1125" y="925" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Auto-scaling</text>
  </g>

  <!-- Data Flow Arrows -->
  <g id="data-flows">
    <!-- Frontend to Backend -->
    <line x1="700" y1="280" x2="700" y2="320" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="720" y="300" font-family="Arial, sans-serif" font-size="12" fill="#666">HTTP/AJAX</text>

    <!-- Backend to Database -->
    <line x1="350" y1="600" x2="350" y2="640" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="370" y="620" font-family="Arial, sans-serif" font-size="12" fill="#666">SQLAlchemy ORM</text>

    <!-- Backend to APIs -->
    <line x1="900" y1="600" x2="900" y2="640" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="920" y="620" font-family="Arial, sans-serif" font-size="12" fill="#666">REST API</text>

    <!-- Database to Backend (bidirectional) -->
    <line x1="330" y1="640" x2="330" y2="600" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- APIs to Backend (bidirectional) -->
    <line x1="880" y1="640" x2="880" y2="600" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>

  <!-- Key Features Box -->
  <g id="key-features">
    <rect x="1100" y="100" width="250" height="180" rx="5" fill="#fff" stroke="#2c3e50" stroke-width="1" stroke-dasharray="5,5" opacity="0"/>
    <text x="1120" y="130" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Key Features 核心特性</text>
    <text x="1120" y="150" font-family="Arial, sans-serif" font-size="12" fill="#555">✓ 99%+ Accuracy 准确率</text>
    <text x="1120" y="170" font-family="Arial, sans-serif" font-size="12" fill="#555">✓ Real-time Data 实时数据</text>
    <text x="1120" y="190" font-family="Arial, sans-serif" font-size="12" fill="#555">✓ Bilingual Support 双语支持</text>
    <text x="1120" y="210" font-family="Arial, sans-serif" font-size="12" fill="#555">✓ 3-Tier Subscription 三级订阅</text>
    <text x="1120" y="230" font-family="Arial, sans-serif" font-size="12" fill="#555">✓ Enterprise Security 企业安全</text>
    <text x="1120" y="250" font-family="Arial, sans-serif" font-size="12" fill="#555">✓ Auto Failover 自动故障转移</text>
  </g>
</svg>