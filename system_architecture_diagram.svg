  <text x="700" y="50" text-anchor="middle" class="title">Bitcoin挖矿计算器系统架构</text>
  <text x="700" y="75" text-anchor="middle" class="subtitle">Bitcoin Mining Calculator System Architecture</text>

  <!-- 用户访问层 -->
