<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; fill: #2c3e50; }
      .section-title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #34495e; }
      .text { font-family: Arial, sans-serif; font-size: 12px; fill: #2c3e50; }
      .small-text { font-family: Arial, sans-serif; font-size: 10px; fill: #7f8c8d; }
      .frontend-box { fill: #3498db; stroke: #2980b9; stroke-width: 2; }
      .backend-box { fill: #e74c3c; stroke: #c0392b; stroke-width: 2; }
      .database-box { fill: #f39c12; stroke: #e67e22; stroke-width: 2; }
      .external-box { fill: #9b59b6; stroke: #8e44ad; stroke-width: 2; }
      .auth-box { fill: #2ecc71; stroke: #27ae60; stroke-width: 2; }
      .arrow { stroke: #34495e; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .data-flow { stroke: #e67e22; stroke-width: 2; fill: none; marker-end: url(#arrowhead); stroke-dasharray: 5,5; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" 
     refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34495e" />
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" class="title">BTC 挖矿计算器系统架构</text>
  
  <!-- Frontend Layer -->
  <g transform="translate(50, 60)">
    <rect class="frontend-box" x="0" y="0" width="300" height="120" rx="10"/>
    <text x="150" y="20" text-anchor="middle" class="section-title" fill="white">前端界面层</text>
    <text x="20" y="45" class="text" fill="white">• Web UI (Flask Templates)</text>
    <text x="20" y="60" class="text" fill="white">• 多语言支持 (中文/英文)</text>
    <text x="20" y="75" class="text" fill="white">• Bootstrap + Chart.js</text>
    <text x="20" y="90" class="text" fill="white">• 响应式设计</text>
    <text x="20" y="105" class="text" fill="white">• 实时数据可视化</text>
  </g>
  
  <!-- Authentication Layer -->
  <g transform="translate(400, 60)">
    <rect class="auth-box" x="0" y="0" width="200" height="120" rx="10"/>
    <text x="100" y="20" text-anchor="middle" class="section-title" fill="white">认证授权层</text>
    <text x="20" y="45" class="text" fill="white">• 邮箱验证登录</text>
    <text x="20" y="60" class="text" fill="white">• 角色权限管理</text>
    <text x="20" y="75" class="text" fill="white">• 会话管理</text>
    <text x="20" y="90" class="text" fill="white">• 访问控制</text>
  </g>
  
  <!-- Backend Application Layer -->
  <g transform="translate(50, 220)">
    <rect class="backend-box" x="0" y="0" width="550" height="180" rx="10"/>
    <text x="275" y="20" text-anchor="middle" class="section-title" fill="white">后端应用层 (Flask)</text>
    
    <!-- Mining Calculator Module -->
    <g transform="translate(20, 30)">
      <rect fill="#c0392b" x="0" y="0" width="120" height="120" rx="5"/>
      <text x="60" y="15" text-anchor="middle" class="text" fill="white">挖矿计算器</text>
      <text x="10" y="35" class="small-text" fill="white">• 收益计算</text>
      <text x="10" y="48" class="small-text" fill="white">• ROI 分析</text>
      <text x="10" y="61" class="small-text" fill="white">• 矿机管理</text>
      <text x="10" y="74" class="small-text" fill="white">• 电费计算</text>
      <text x="10" y="87" class="small-text" fill="white">• 削减计算</text>
      <text x="10" y="100" class="small-text" fill="white">• 图表生成</text>
    </g>
    
    <!-- CRM Module -->
    <g transform="translate(160, 30)">
      <rect fill="#c0392b" x="0" y="0" width="120" height="120" rx="5"/>
      <text x="60" y="15" text-anchor="middle" class="text" fill="white">CRM 系统</text>
      <text x="10" y="35" class="small-text" fill="white">• 客户管理</text>
      <text x="10" y="48" class="small-text" fill="white">• 商机跟踪</text>
      <text x="10" y="61" class="small-text" fill="white">• 交易管理</text>
      <text x="10" y="74" class="small-text" fill="white">• 活动记录</text>
      <text x="10" y="87" class="small-text" fill="white">• 联系人管理</text>
      <text x="10" y="100" class="small-text" fill="white">• 权限分配</text>
    </g>
    
    <!-- User Management Module -->
    <g transform="translate(300, 30)">
      <rect fill="#c0392b" x="0" y="0" width="120" height="120" rx="5"/>
      <text x="60" y="15" text-anchor="middle" class="text" fill="white">用户管理</text>
      <text x="10" y="35" class="small-text" fill="white">• 访问权限</text>
      <text x="10" y="48" class="small-text" fill="white">• 登录记录</text>
      <text x="10" y="61" class="small-text" fill="white">• 地理位置</text>
      <text x="10" y="74" class="small-text" fill="white">• 用户迁移</text>
      <text x="10" y="87" class="small-text" fill="white">• 角色管理</text>
      <text x="10" y="100" class="small-text" fill="white">• 安全审计</text>
    </g>
    
    <!-- API Integration Module -->
    <g transform="translate(440, 30)">
      <rect fill="#c0392b" x="0" y="0" width="90" height="120" rx="5"/>
      <text x="45" y="15" text-anchor="middle" class="text" fill="white">API 集成</text>
      <text x="10" y="35" class="small-text" fill="white">• 数据获取</text>
      <text x="10" y="48" class="small-text" fill="white">• 错误处理</text>
      <text x="10" y="61" class="small-text" fill="white">• 缓存机制</text>
      <text x="10" y="74" class="small-text" fill="white">• 重试逻辑</text>
      <text x="10" y="87" class="small-text" fill="white">• 数据转换</text>
    </g>
  </g>
  
  <!-- Database Layer -->
  <g transform="translate(50, 440)">
    <rect class="database-box" x="0" y="0" width="550" height="100" rx="10"/>
    <text x="275" y="20" text-anchor="middle" class="section-title" fill="white">数据存储层 (PostgreSQL)</text>
    
    <text x="20" y="45" class="text" fill="white">• 用户访问权限表 (user_access)</text>
    <text x="20" y="60" class="text" fill="white">• 登录记录表 (login_records)</text>
    <text x="20" y="75" class="text" fill="white">• CRM 客户表 (crm_customers, crm_contacts, crm_leads, crm_deals, crm_activities)</text>
    <text x="20" y="90" class="text" fill="white">• 关联关系管理与数据完整性约束</text>
  </g>
  
  <!-- External APIs -->
  <g transform="translate(650, 220)">
    <rect class="external-box" x="0" y="0" width="200" height="180" rx="10"/>
    <text x="100" y="20" text-anchor="middle" class="section-title" fill="white">外部 API 服务</text>
    
    <g transform="translate(20, 30)">
      <rect fill="#8e44ad" x="0" y="0" width="160" height="40" rx="5"/>
      <text x="80" y="15" text-anchor="middle" class="text" fill="white">CoinGecko API</text>
      <text x="80" y="28" text-anchor="middle" class="small-text" fill="white">实时 BTC 价格</text>
    </g>
    
    <g transform="translate(20, 80)">
      <rect fill="#8e44ad" x="0" y="0" width="160" height="40" rx="5"/>
      <text x="80" y="15" text-anchor="middle" class="text" fill="white">Blockchain.info API</text>
      <text x="80" y="28" text-anchor="middle" class="small-text" fill="white">网络难度/哈希率</text>
    </g>
    
    <g transform="translate(20, 130)">
      <rect fill="#8e44ad" x="0" y="0" width="160" height="20" rx="5"/>
      <text x="80" y="12" text-anchor="middle" class="small-text" fill="white">区块奖励 & 网络统计</text>
    </g>
  </g>
  
  <!-- Power Management System -->
  <g transform="translate(650, 440)">
    <rect class="external-box" x="0" y="0" width="200" height="100" rx="10"/>
    <text x="100" y="20" text-anchor="middle" class="section-title" fill="white">电力管理系统</text>
    <text x="20" y="45" class="text" fill="white">• 电力削减计算</text>
    <text x="20" y="60" class="text" fill="white">• 矿机关机策略</text>
    <text x="20" y="75" class="text" fill="white">• 功耗优化</text>
    <text x="20" y="90" class="text" fill="white">• API 测试工具</text>
  </g>
  
  <!-- User Access Flow -->
  <g transform="translate(900, 60)">
    <rect class="auth-box" x="0" y="0" width="250" height="180" rx="10"/>
    <text x="125" y="20" text-anchor="middle" class="section-title" fill="white">用户访问流程</text>
    <text x="20" y="45" class="text" fill="white">1. 邮箱验证登录</text>
    <text x="20" y="60" class="text" fill="white">2. 权限检查 (guest/mine/admin/owner)</text>
    <text x="20" y="75" class="text" fill="white">3. 功能模块访问控制:</text>
    <text x="30" y="90" class="small-text" fill="white">• Guest: 基础计算器</text>
    <text x="30" y="103" class="small-text" fill="white">• Mine: 客户管理</text>
    <text x="30" y="116" class="small-text" fill="white">• Admin: 用户管理</text>
    <text x="30" y="129" class="small-text" fill="white">• Owner: 系统管理</text>
    <text x="20" y="150" class="text" fill="white">4. 登录记录 & 地理位置追踪</text>
    <text x="20" y="165" class="text" fill="white">5. 会话管理 & 安全控制</text>
  </g>
  
  <!-- Data Flow Lines -->
  <path class="arrow" d="M 200 180 L 200 210"/>
  <path class="arrow" d="M 500 180 L 500 210"/>
  <path class="arrow" d="M 325 400 L 325 430"/>
  <path class="data-flow" d="M 600 300 L 640 300"/>
  <path class="data-flow" d="M 600 350 L 640 350"/>
  <path class="arrow" d="M 750 400 L 750 430"/>
  
  <!-- Legend -->
  <g transform="translate(900, 280)">
    <text x="0" y="0" class="section-title">图例说明</text>
    <rect class="frontend-box" x="0" y="10" width="20" height="15"/>
    <text x="30" y="22" class="small-text">前端界面</text>
    <rect class="auth-box" x="0" y="30" width="20" height="15"/>
    <text x="30" y="42" class="small-text">认证授权</text>
    <rect class="backend-box" x="0" y="50" width="20" height="15"/>
    <text x="30" y="62" class="small-text">后端应用</text>
    <rect class="database-box" x="0" y="70" width="20" height="15"/>
    <text x="30" y="82" class="small-text">数据存储</text>
    <rect class="external-box" x="0" y="90" width="20" height="15"/>
    <text x="30" y="102" class="small-text">外部服务</text>
    <path class="arrow" d="M 0 115 L 20 115"/>
    <text x="30" y="120" class="small-text">数据流向</text>
    <path class="data-flow" d="M 0 130 L 20 130"/>
    <text x="30" y="135" class="small-text">API 调用</text>
  </g>
  
  <!-- System Features -->
  <g transform="translate(900, 450)">
    <text x="0" y="0" class="section-title">核心特性</text>
    <text x="0" y="20" class="small-text">✓ 实时挖矿收益计算</text>
    <text x="0" y="35" class="small-text">✓ 多语言国际化支持</text>
    <text x="0" y="50" class="small-text">✓ 完整的 CRM 客户管理</text>
    <text x="0" y="65" class="small-text">✓ 灵活的权限控制系统</text>
    <text x="0" y="80" class="small-text">✓ 电力削减智能计算</text>
    <text x="0" y="95" class="small-text">✓ 自动化 API 数据获取</text>
    <text x="0" y="110" class="small-text">✓ 地理位置安全追踪</text>
    <text x="0" y="125" class="small-text">✓ ROI 投资回报分析</text>
  </g>
  
  <!-- Technology Stack -->
  <g transform="translate(50, 580)">
    <text x="0" y="0" class="section-title">技术栈</text>
    <text x="0" y="20" class="text">后端框架: Flask + SQLAlchemy + PostgreSQL</text>
    <text x="0" y="35" class="text">前端技术: Bootstrap + Chart.js + Jinja2 Templates</text>
    <text x="0" y="50" class="text">部署平台: Replit + Gunicorn</text>
    <text x="0" y="65" class="text">外部集成: CoinGecko API + Blockchain.info API</text>
    <text x="0" y="80" class="text">安全特性: 邮箱验证 + 会话管理 + 地理位置追踪</text>
  </g>
  
  <!-- Performance Notes -->
  <g transform="translate(650, 580)">
    <text x="0" y="0" class="section-title">性能优化</text>
    <text x="0" y="20" class="text">• API 缓存机制减少外部调用</text>
    <text x="0" y="35" class="text">• 数据库连接池管理</text>
    <text x="0" y="50" class="text">• 错误重试与降级策略</text>
    <text x="0" y="65" class="text">• 实时数据更新与可视化</text>
    <text x="0" y="80" class="text">• 多语言资源动态加载</text>
  </g>
  
  <!-- Version Info -->
  <text x="1150" y="790" text-anchor="end" class="small-text">Version 2.0 - BTC Mining Calculator System Architecture</text>
</svg>