  </g>
  
  <g transform="translate(520, 165)">
    <rect x="0" y="0" width="180" height="45" class="user-gradient shadow"/>
    <text x="90" y="20" text-anchor="middle" class="white-text">Mining Site 矿场主</text>
    <text x="90" y="35" text-anchor="middle" class="tiny-text" fill="rgba(255,255,255,0.8)">业务操作权限</text>
  </g>
  
  <g transform="translate(720, 165)">
    <rect x="0" y="0" width="180" height="45" class="user-gradient shadow"/>
    <text x="90" y="20" text-anchor="middle" class="white-text">Manager 经理</text>
    <text x="90" y="35" text-anchor="middle" class="tiny-text" fill="rgba(255,255,255,0.8)">CRM专用权限</text>
