<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 28px; font-weight: bold; fill: #1a202c; }
      .subtitle { font-family: 'Segoe UI', Arial, sans-serif; font-size: 18px; font-weight: 600; fill: #2d3748; }
      .layer-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: 600; fill: #1a202c; }
      .text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #1a202c; }
      .small-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #4a5568; }
      .tiny-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 9px; fill: #718096; }
      .white-text { fill: white; font-weight: 600; }
      .black-text { fill: #1a202c; font-weight: 600; }
      
      /* 渐变定义 */
      .user-gradient { fill: url(#userGrad); stroke: #6b46c1; stroke-width: 2; rx: 12; }
      .frontend-gradient { fill: url(#frontendGrad); stroke: #0c4a6e; stroke-width: 2; rx: 10; }
      .backend-gradient { fill: url(#backendGrad); stroke: #991b1b; stroke-width: 2; rx: 10; }
      .database-gradient { fill: url(#databaseGrad); stroke: #166534; stroke-width: 2; rx: 10; }
      .api-gradient { fill: url(#apiGrad); stroke: #ea580c; stroke-width: 2; rx: 10; }
      .infra-gradient { fill: url(#infraGrad); stroke: #7c2d12; stroke-width: 2; rx: 10; }
      
      .layer-bg { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 2; rx: 15; }
      .connector { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .data-flow { stroke: #f59e0b; stroke-width: 3; fill: none; stroke-dasharray: 8,4; marker-end: url(#dataArrow); }
      
      /* 阴影 */
      .shadow { filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.1)); }
    </style>
    
    <!-- 渐变定义 -->
    <linearGradient id="userGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="frontendGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="backendGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b91c1c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="databaseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#15803d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="apiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="infraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a16207;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#92400e;stop-opacity:1" />
    </linearGradient>
    
    <!-- 箭头标记 -->
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#475569" />
    </marker>
    <marker id="dataArrow" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#f59e0b" />
    </marker>
  </defs>

  <!-- 背景渐变 -->
