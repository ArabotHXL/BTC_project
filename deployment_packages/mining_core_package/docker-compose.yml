# Mining Core Module Docker Compose Configuration
# 挖矿核心模块Docker Compose配置

version: '3.8'

services:
  # Mining Core Application
  mining-core:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: mining-core-app
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://mining_user:mining_password@postgres:5432/mining_core_db
      - SESSION_SECRET=${SESSION_SECRET:-default-secret-change-in-production}
      - COINWARZ_API_KEY=${COINWARZ_API_KEY}
      - BITCOIN_RPC_URL=${BITCOIN_RPC_URL}
      - BITCOIN_RPC_USER=${BITCOIN_RPC_USER}
      - BITCOIN_RPC_PASSWORD=${BITCOIN_RPC_PASSWORD}
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - ./reports:/app/reports
    depends_on:
      - postgres
      - redis
    networks:
      - mining-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: mining-core-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mining_core_db
      POSTGRES_USER: mining_user
      POSTGRES_PASSWORD: mining_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - mining-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mining_user -d mining_core_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: mining-core-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - mining-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: mining-core-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - mining-core
    networks:
      - mining-network
    profiles:
      - with-nginx

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  mining-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16