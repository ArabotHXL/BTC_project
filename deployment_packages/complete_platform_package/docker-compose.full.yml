# HashInsight Complete Platform Docker Compose Configuration
# HashInsight完整平台Docker Compose配置

version: '3.8'

services:
  # Mining Core Module
  mining-core:
    build: 
      context: ./mining_core_module
      dockerfile: ../mining_core_package/Dockerfile
    container_name: hashinsight-mining-core
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://platform_user:platform_password@postgres:5432/mining_platform_db
      - SESSION_SECRET=${MINING_CORE_SECRET:-mining-core-secret-change-in-production}
      - REDIS_URL=redis://redis:6379/0
      - MINING_POOL_URL=${MINING_POOL_URL}
      - MINING_POOL_USERNAME=${MINING_POOL_USERNAME}
      - MINING_POOL_PASSWORD=${MINING_POOL_PASSWORD}
    volumes:
      - ./logs:/app/logs
      - mining_data:/app/data
    depends_on:
      - postgres
      - redis
    networks:
      - platform-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Web3 Integration Module  
  web3-integration:
    build: 
      context: ./web3_integration_module
      dockerfile: ../web3_integration_package/Dockerfile
    container_name: hashinsight-web3-integration
    restart: unless-stopped
    ports:
      - "5002:5002"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://platform_user:platform_password@postgres:5432/mining_platform_db
      - SESSION_SECRET=${WEB3_SECRET:-web3-secret-change-in-production}
      - ETHEREUM_RPC_URL=${ETHEREUM_RPC_URL}
      - PRIVATE_KEY=${PRIVATE_KEY}
      - INFURA_PROJECT_ID=${INFURA_PROJECT_ID}
      - REDIS_URL=redis://redis:6379/1
    volumes:
      - ./logs:/app/logs
      - web3_contracts:/app/contracts
      - web3_uploads:/app/uploads
    depends_on:
      - postgres
      - redis
    networks:
      - platform-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # User Management Module
  user-management:
    build: 
      context: ./user_management_module
      dockerfile: ../user_management_package/Dockerfile
    container_name: hashinsight-user-management
    restart: unless-stopped
    ports:
      - "5003:5003"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://platform_user:platform_password@postgres:5432/mining_platform_db
      - SESSION_SECRET=${USER_MGMT_SECRET:-user-mgmt-secret-change-in-production}
      - SMTP_SERVER=${SMTP_SERVER}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - REDIS_URL=redis://redis:6379/2
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-jwt-secret-change-in-production}
    volumes:
      - ./logs:/app/logs
      - user_uploads:/app/uploads
      - user_exports:/app/exports
    depends_on:
      - postgres
      - redis
    networks:
      - platform-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Database (Shared)
  postgres:
    image: postgres:15-alpine
    container_name: hashinsight-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mining_platform_db
      POSTGRES_USER: platform_user
      POSTGRES_PASSWORD: platform_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
      - ./database/backups:/backups
    ports:
      - "5432:5432"
    networks:
      - platform-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform_user -d mining_platform_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache (Shared)
  redis:
    image: redis:7-alpine
    container_name: hashinsight-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - platform-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Nginx API Gateway
  nginx-gateway:
    image: nginx:alpine
    container_name: hashinsight-nginx-gateway
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - mining-core
      - web3-integration
      - user-management
    networks:
      - platform-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Celery Workers (Background Tasks)
  celery-worker:
    build:
      context: ./user_management_module
      dockerfile: ../user_management_package/Dockerfile
    container_name: hashinsight-celery-worker
    restart: unless-stopped
    command: celery -A user_management_module.app:celery worker --loglevel=info
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://platform_user:platform_password@postgres:5432/mining_platform_db
      - REDIS_URL=redis://redis:6379/3
      - SMTP_SERVER=${SMTP_SERVER}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
    volumes:
      - ./logs:/app/logs
      - user_exports:/app/exports
    depends_on:
      - postgres
      - redis
    networks:
      - platform-network
    profiles:
      - with-workers

  # Celery Beat (Scheduled Tasks)
  celery-beat:
    build:
      context: ./user_management_module
      dockerfile: ../user_management_package/Dockerfile
    container_name: hashinsight-celery-beat
    restart: unless-stopped
    command: celery -A user_management_module.app:celery beat --loglevel=info
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://platform_user:platform_password@postgres:5432/mining_platform_db
      - REDIS_URL=redis://redis:6379/3
    volumes:
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
    networks:
      - platform-network
    profiles:
      - with-workers

  # Monitoring with Prometheus (Optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: hashinsight-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - platform-network
    profiles:
      - with-monitoring

  # Grafana Dashboard (Optional)
  grafana:
    image: grafana/grafana:latest
    container_name: hashinsight-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - platform-network
    profiles:
      - with-monitoring

  # pgAdmin (Database Management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hashinsight-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@hashinsight.net
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - platform-network
    profiles:
      - with-admin

  # IPFS Node (for NFT storage)
  ipfs:
    image: ipfs/go-ipfs:latest
    container_name: hashinsight-ipfs
    restart: unless-stopped
    ports:
      - "4001:4001"    # P2P port
      - "5001:5001"    # API port
      - "8081:8080"    # Gateway port
    volumes:
      - ipfs_data:/data/ipfs
    networks:
      - platform-network
    profiles:
      - with-ipfs

  # Ganache (Local Ethereum for development)
  ganache:
    image: trufflesuite/ganache-cli:latest
    container_name: hashinsight-ganache
    restart: unless-stopped
    ports:
      - "8545:8545"
    command: >
      --host 0.0.0.0
      --port 8545
      --networkId 1337
      --accounts 10
      --deterministic
      --mnemonic "test test test test test test test test test test test junk"
      --gasLimit 10000000
    networks:
      - platform-network
    profiles:
      - development

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local
  grafana_data:
    driver: local
  prometheus_data:
    driver: local
  ipfs_data:
    driver: local
  mining_data:
    driver: local
  web3_contracts:
    driver: local
  web3_uploads:
    driver: local
  user_uploads:
    driver: local
  user_exports:
    driver: local

networks:
  platform-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# 使用说明 Usage:
# 
# 基础平台启动：
# docker-compose -f docker-compose.full.yml up -d
#
# 包含后台任务：
# docker-compose -f docker-compose.full.yml --profile with-workers up -d
#
# 包含监控：
# docker-compose -f docker-compose.full.yml --profile with-monitoring up -d
#
# 包含管理界面：
# docker-compose -f docker-compose.full.yml --profile with-admin up -d
#
# 开发环境（包含本地区块链）：
# docker-compose -f docker-compose.full.yml --profile development up -d
#
# 完整功能（所有服务）：
# docker-compose -f docker-compose.full.yml --profile with-workers --profile with-monitoring --profile with-admin --profile with-ipfs up -d