{% extends "base.html" %}

{% block title %}访问被拒绝 - 403错误{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8 text-center">
            <div class="error-page">
                <div class="error-code">
                    <h1 class="display-1 text-warning">403</h1>
                </div>
                <div class="error-message">
                    <h2 class="mb-4">访问被拒绝</h2>
                    <p class="lead mb-4">抱歉，您没有权限访问这个页面。</p>
                    <p class="text-muted mb-4">如果您认为这是一个错误，请联系系统管理员。</p>
                    <div class="error-actions">
                        <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg me-3">
                            <i class="fas fa-home"></i> 返回首页
                        </a>
                        {% if not is_authenticated %}
                        <a href="{{ url_for('users.login') }}" class="btn btn-outline-secondary btn-lg">
                            <i class="fas fa-sign-in-alt"></i> 登录
                        </a>
                        {% else %}
                        <button onclick="history.back()" class="btn btn-outline-secondary btn-lg">
                            <i class="fas fa-arrow-left"></i> 返回上页
                        </button>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.error-page {
    padding: 60px 0;
}

.error-code h1 {
    font-size: 8rem;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    margin-bottom: 0;
}

.error-message h2 {
    color: var(--text-light);
    margin-top: 20px;
}

.error-actions {
    margin-top: 30px;
}

@media (max-width: 768px) {
    .error-code h1 {
        font-size: 5rem;
    }
    
    .error-actions .btn {
        display: block;
        width: 100%;
        margin-bottom: 10px;
    }
}
</style>
{% endblock %}
