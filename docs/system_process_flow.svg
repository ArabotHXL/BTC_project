<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="2000" xmlns="http://www.w3.org/2000/svg">
    <style>
        .title { font: bold 24px sans-serif; fill: #333; }
        .subtitle { font: bold 18px sans-serif; fill: #555; }
        .box { stroke: #2c3e50; stroke-width: 2; rx: 10; ry: 10; }
        .process { fill: #3498db; }
        .decision { fill: #e74c3c; }
        .data { fill: #f1c40f; }
        .start-end { fill: #2ecc71; }
        .user { fill: #9b59b6; }
        .system { fill: #1abc9c; }
        .arrow { stroke: #888; stroke-width: 2; marker-end: url(#arrowhead); }
        .text { font: 14px sans-serif; fill: white; text-anchor: middle; }
        .label { font: 14px sans-serif; fill: #555; }
        .note { font: 12px sans-serif; fill: #666; }
    </style>
    
    <!-- Arrow Marker Definition -->
    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#888" />
        </marker>
    </defs>
    
    <!-- Title -->
    <text x="600" y="40" class="title" text-anchor="middle">BTC 挖矿计算器 - 系统流程图</text>
    <text x="600" y="70" class="subtitle" text-anchor="middle">用户交互与数据流程</text>
    
    <!-- 1. 用户认证流程 -->
    <text x="600" y="110" class="subtitle" text-anchor="middle">用户认证流程</text>
    
    <!-- Start -->
    <rect x="100" y="150" width="150" height="60" class="box start-end" />
    <text x="175" y="185" class="text">用户访问系统</text>
    
    <!-- Process: Check Session -->
    <rect x="100" y="250" width="150" height="60" class="box process" />
    <text x="175" y="285" class="text">检查会话状态</text>
    
    <!-- Decision: Authenticated? -->
    <polygon points="175,350 250,400 175,450 100,400" class="box decision" />
    <text x="175" y="405" class="text">已认证?</text>
    
    <!-- Process: Show Login Page -->
    <rect x="300" y="370" width="150" height="60" class="box process" />
    <text x="375" y="405" class="text">显示登录页面</text>
    
    <!-- Process: User Inputs Email -->
    <rect x="500" y="370" width="150" height="60" class="box user" />
    <text x="575" y="405" class="text">用户输入邮箱</text>
    
    <!-- Process: Verify Email -->
    <rect x="700" y="370" width="150" height="60" class="box process" />
    <text x="775" y="405" class="text">验证邮箱授权</text>
    
    <!-- Decision: Authorized? -->
    <polygon points="775,470 850,520 775,570 700,520" class="box decision" />
    <text x="775" y="525" class="text">已授权?</text>
    
    <!-- Process: Record Login Attempt -->
    <rect x="700" y="270" width="150" height="60" class="box process" />
    <text x="775" y="305" class="text">记录登录尝试</text>
    
    <!-- Process: Store Location Data -->
    <rect x="900" y="270" width="150" height="60" class="box data" />
    <text x="975" y="305" class="text">存储地理位置数据</text>
    
    <!-- Process: Show Unauthorized -->
    <rect x="900" y="490" width="150" height="60" class="box process" />
    <text x="975" y="525" class="text">显示未授权页面</text>
    
    <!-- Process: Create Session -->
    <rect x="500" y="490" width="150" height="60" class="box process" />
    <text x="575" y="525" class="text">创建用户会话</text>
    
    <!-- Process: Set User Role -->
    <rect x="300" y="490" width="150" height="60" class="box process" />
    <text x="375" y="525" class="text">设置用户角色</text>
    
    <!-- End: Redirect to Dashboard -->
    <rect x="100" y="490" width="150" height="60" class="box start-end" />
    <text x="175" y="525" class="text">重定向到主页</text>
    
    <!-- Connections -->
    <line x1="175" y1="210" x2="175" y2="250" class="arrow" />
    <line x1="175" y1="310" x2="175" y2="350" class="arrow" />
    
    <line x1="175" y1="450" x2="175" y2="490" class="arrow" />
    <text x="185" y="470" class="label">是</text>
    
    <line x1="250" y1="400" x2="300" y2="400" class="arrow" />
    <text x="270" y="390" class="label">否</text>
    
    <line x1="450" y1="400" x2="500" y2="400" class="arrow" />
    <line x1="650" y1="400" x2="700" y2="400" class="arrow" />
    <line x1="775" y1="430" x2="775" y2="470" class="arrow" />
    
    <line x1="775" y1="570" x2="775" y2="610" class="arrow" />
    <line x1="850" y1="520" x2="900" y2="520" class="arrow" />
    <text x="870" y="510" class="label">否</text>
    
    <line x1="700" y1="520" x2="650" y2="520" class="arrow" />
    <text x="670" y="510" class="label">是</text>
    
    <line x1="500" y1="520" x2="450" y2="520" class="arrow" />
    <line x1="300" y1="520" x2="250" y2="520" class="arrow" />
    <line x1="775" y1="370" x2="775" y2="330" class="arrow" />
    <line x1="850" y1="300" x2="900" y2="300" class="arrow" />
    
    <!-- 2. 挖矿计算器流程 -->
    <text x="600" y="610" class="subtitle" text-anchor="middle">挖矿计算器流程</text>
    
    <!-- Start: User Accesses Calculator -->
    <rect x="100" y="650" width="150" height="60" class="box start-end" />
    <text x="175" y="685" class="text">用户访问计算器</text>
    
    <!-- Process: Load Real-time Data -->
    <rect x="300" y="650" width="150" height="60" class="box process" />
    <text x="375" y="685" class="text">加载实时数据</text>
    
    <!-- Data: API Calls -->
    <rect x="500" y="650" width="150" height="60" class="box data" />
    <text x="575" y="685" class="text">BTC价格和网络API</text>
    
    <!-- Process: User Inputs Parameters -->
    <rect x="100" y="750" width="150" height="60" class="box user" />
    <text x="175" y="785" class="text">输入计算参数</text>
    
    <!-- Data: Parameters -->
    <rect x="300" y="750" width="300" height="60" class="box data" />
    <text x="450" y="775" class="text">矿机型号、数量、功率、电费、限电率</text>
    <text x="450" y="795" class="text">是否使用实时价格、投资额</text>
    
    <!-- Process: Calculate Profitability -->
    <rect x="100" y="850" width="150" height="60" class="box process" />
    <text x="175" y="885" class="text">计算盈利能力</text>
    
    <!-- Process: Algorithm Selection -->
    <rect x="300" y="850" width="150" height="60" class="box process" />
    <text x="375" y="875" class="text">算法选择</text>
    <text x="375" y="895" class="text">(难度或哈希率)</text>
    
    <!-- Data: Results -->
    <rect x="100" y="950" width="500" height="60" class="box data" />
    <text x="350" y="975" class="text">BTC产出、收入、成本、利润、ROI、盈亏平衡点、优化建议</text>
    
    <!-- Decision: Role Check -->
    <polygon points="650,950 725,1000 650,1050 575,1000" class="box decision" />
    <text x="650" y="1005" class="text">用户角色检查</text>
    
    <!-- Process: Filter Results -->
    <rect x="775" y="970" width="150" height="60" class="box process" />
    <text x="850" y="1005" class="text">过滤敏感数据</text>
    
    <!-- Process: Complete Results -->
    <rect x="500" y="1050" width="150" height="60" class="box process" />
    <text x="575" y="1085" class="text">完整结果显示</text>
    
    <!-- Process: Generate Charts -->
    <rect x="300" y="1050" width="150" height="60" class="box process" />
    <text x="375" y="1085" class="text">生成图表和热力图</text>
    
    <!-- End: Display Results -->
    <rect x="100" y="1050" width="150" height="60" class="box start-end" />
    <text x="175" y="1085" class="text">显示结果</text>
    
    <!-- Connections -->
    <line x1="250" y1="680" x2="300" y2="680" class="arrow" />
    <line x1="450" y1="680" x2="500" y2="680" class="arrow" />
    <line x1="175" y1="710" x2="175" y2="750" class="arrow" />
    <line x1="250" y1="780" x2="300" y2="780" class="arrow" />
    <line x1="175" y1="810" x2="175" y2="850" class="arrow" />
    <line x1="250" y1="880" x2="300" y2="880" class="arrow" />
    <line x1="175" y1="910" x2="175" y2="950" class="arrow" />
    <line x1="600" y1="980" x2="650" y2="980" class="arrow" />
    <line x1="650" y1="1050" x2="650" y2="1080" class="arrow" />
    <text x="660" y="1060" class="label">矿场主</text>
    <line x1="725" y1="1000" x2="775" y2="1000" class="arrow" />
    <text x="745" y="990" class="label">客户</text>
    <line x1="850" y1="1030" x2="850" y2="1085" class="arrow" />
    <line x1="500" y1="1080" x2="450" y2="1080" class="arrow" />
    <line x1="300" y1="1080" x2="250" y2="1080" class="arrow" />
    
    <!-- 3. 电力管理流程 -->
    <text x="600" y="1150" class="subtitle" text-anchor="middle">电力管理系统流程</text>
    
    <!-- Start: Admin Access Power Management -->
    <rect x="100" y="1200" width="150" height="60" class="box start-end" />
    <text x="175" y="1235" class="text">管理员访问电力系统</text>
    
    <!-- Decision: Has Permission? -->
    <polygon points="175,1300 250,1350 175,1400 100,1350" class="box decision" />
    <text x="175" y="1355" class="text">有权限?</text>
    
    <!-- Process: Load Dashboard -->
    <rect x="300" y="1320" width="150" height="60" class="box process" />
    <text x="375" y="1355" class="text">加载电力仪表盘</text>
    
    <!-- Process: Initialize System -->
    <rect x="500" y="1320" width="150" height="60" class="box system" />
    <text x="575" y="1355" class="text">初始化系统数据</text>
    
    <!-- Process: Analyze Miner Health -->
    <rect x="300" y="1420" width="150" height="60" class="box process" />
    <text x="375" y="1455" class="text">分析矿机健康状况</text>
    
    <!-- Data: Miner Grades -->
    <rect x="500" y="1420" width="150" height="60" class="box data" />
    <text x="575" y="1455" class="text">矿机分级 (A-D)</text>
    
    <!-- Process: Apply Power Reduction -->
    <rect x="300" y="1520" width="150" height="60" class="box process" />
    <text x="375" y="1555" class="text">应用电力削减策略</text>
    
    <!-- Process: Generate Rotation Plan -->
    <rect x="500" y="1520" width="150" height="60" class="box process" />
    <text x="575" y="1555" class="text">生成轮换计划</text>
    
    <!-- Process: Execute Plan -->
    <rect x="700" y="1520" width="150" height="60" class="box process" />
    <text x="775" y="1555" class="text">执行轮换计划</text>
    
    <!-- Data: Operations History -->
    <rect x="500" y="1620" width="150" height="60" class="box data" />
    <text x="575" y="1655" class="text">操作历史记录</text>
    
    <!-- End: View Results -->
    <rect x="300" y="1620" width="150" height="60" class="box start-end" />
    <text x="375" y="1655" class="text">查看结果和统计</text>
    
    <!-- Connections -->
    <line x1="175" y1="1260" x2="175" y2="1300" class="arrow" />
    <line x1="250" y1="1350" x2="300" y2="1350" class="arrow" />
    <text x="270" y="1340" class="label">是</text>
    <line x1="450" y1="1350" x2="500" y2="1350" class="arrow" />
    <line x1="375" y1="1380" x2="375" y2="1420" class="arrow" />
    <line x1="450" y1="1450" x2="500" y2="1450" class="arrow" />
    <line x1="375" y1="1480" x2="375" y2="1520" class="arrow" />
    <line x1="450" y1="1550" x2="500" y2="1550" class="arrow" />
    <line x1="650" y1="1550" x2="700" y2="1550" class="arrow" />
    <line x1="375" y1="1580" x2="375" y2="1620" class="arrow" />
    <line x1="500" y1="1650" x2="450" y2="1650" class="arrow" />
    
    <!-- 4. CRM系统流程 -->
    <text x="600" y="1720" class="subtitle" text-anchor="middle">CRM系统流程</text>
    
    <!-- Start: User Access CRM -->
    <rect x="100" y="1770" width="150" height="60" class="box start-end" />
    <text x="175" y="1805" class="text">用户访问CRM</text>
    
    <!-- Decision: Has CRM Access? -->
    <polygon points="175,1870 250,1920 175,1970 100,1920" class="box decision" />
    <text x="175" y="1925" class="text">有CRM权限?</text>
    
    <!-- Process: CRM Dashboard -->
    <rect x="350" y="1890" width="150" height="60" class="box process" />
    <text x="425" y="1925" class="text">CRM仪表盘</text>
    
    <!-- Process: Manage Customers -->
    <rect x="200" y="1990" width="150" height="60" class="box process" />
    <text x="275" y="2025" class="text">管理客户</text>
    
    <!-- Process: Manage Leads -->
    <rect x="400" y="1990" width="150" height="60" class="box process" />
    <text x="475" y="2025" class="text">管理商机</text>
    
    <!-- Process: Manage Deals -->
    <rect x="600" y="1990" width="150" height="60" class="box process" />
    <text x="675" y="2025" class="text">管理交易</text>
    
    <!-- Process: Track Activities -->
    <rect x="800" y="1990" width="150" height="60" class="box process" />
    <text x="875" y="2025" class="text">记录活动</text>
    
    <!-- Data: Database Operations -->
    <rect x="500" y="2090" width="150" height="60" class="box data" />
    <text x="575" y="2125" class="text">数据库操作</text>
    
    <!-- Connections -->
    <line x1="175" y1="1830" x2="175" y2="1870" class="arrow" />
    <line x1="250" y1="1920" x2="350" y2="1920" class="arrow" />
    <text x="290" y="1910" class="label">是</text>
    <line x1="425" y1="1950" x2="425" y2="1970" class="arrow" />
    <line x1="275" y1="1970" x2="275" y2="1990" class="arrow" />
    <line x1="475" y1="1970" x2="475" y2="1990" class="arrow" />
    <line x1="575" y1="1970" x2="675" y2="1990" class="arrow" />
    <line x1="575" y1="1970" x2="875" y2="1990" class="arrow" />
    <line x1="275" y1="2050" x2="275" y2="2125" class="arrow" />
    <line x1="475" y1="2050" x2="475" y2="2125" class="arrow" />
    <line x1="675" y1="2050" x2="575" y2="2090" class="arrow" />
    <line x1="875" y1="2050" x2="575" y2="2125" class="arrow" />
    
    <!-- Notes -->
    <text x="100" y="1940" class="note">注: CRM系统集成了客户管理、商机跟踪和交易处理功能，主要面向矿场主和管理员用户。</text>
    <text x="700" y="1340" class="note">注: 电力管理系统根据矿机健康状况智能管理电力使用，提高运营效率。</text>
    <text x="700" y="1360" class="note">系统会优先关闭健康状况较差的矿机(C/D级)，保证整体收益最大化。</text>
    <text x="700" y="880" class="note">注: 挖矿计算器使用两种算法计算BTC产出:</text>
    <text x="700" y="900" class="note">1. 基于网络算力和份额</text>
    <text x="700" y="920" class="note">2. 基于网络难度和算力</text>
    
    <text x="100" y="1950" class="note">© 2025 - BTC挖矿计算器系统流程</text>
</svg>